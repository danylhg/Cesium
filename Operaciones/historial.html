<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Historial de Operación - Replay</title>

  <link rel="stylesheet" href="css/historial.css" />
  <script src="js/auth_check.js"></script>

  <!-- Cesium JS -->
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.139.1/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.139.1/Build/Cesium/Cesium.js"></script>

  <!-- MilSymbol -->
  <script src="https://unpkg.com/milsymbol@2.2.0/dist/milsymbol.js"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

  <header class="topbar">
    <div class="topbarLeft">
      <button id="btnBack" class="btnIconOnly" title="Volver al menú">⬅</button>
      <div class="brand">
        <img src="img/logo_sedam.jpeg" alt="Logo" class="logo" />
        <div class="brandText">
          <div id="opName" class="opName">Cargando operación...</div>
          <div id="opMeta" class="opMeta">Historial y Replay</div>
        </div>
      </div>
    </div>

    <div class="topbarRight">
      <div class="timeDisplay">
        <span id="currentTimeLabel">00:00:00</span>
        <span class="timeSeparator">/</span>
        <span id="totalTimeLabel">00:00:00</span>
      </div>
    </div>
  </header>

  <main class="playbackStage">
    <!-- Cesium Map Container -->
    <div id="map" class="mapBox"></div>

    <!-- Right Side Panel: Chat, Events & Info -->
    <aside id="sidePanel" class="sidePanel">
      <div class="panelTabs">
        <button class="tabBtn active" data-tab="info">Información</button>
        <button class="tabBtn" data-tab="chat">Conversaciones</button>
        <button class="tabBtn" data-tab="events">Eventos</button>
      </div>

      <div class="tabContent" id="infoTab">
        <div id="opInfoDetails" class="opInfoDetails">
          <!-- Operation info will be injected here -->
        </div>
      </div>

      <div class="tabContent hidden" id="chatTab">
        <div id="chatMessages" class="chatMessages">
          <!-- Messages will be injected here -->
        </div>
      </div>

      <div class="tabContent hidden" id="eventsTab">
        <div id="eventLog" class="eventLog">
          <!-- Events will be injected here -->
        </div>
      </div>
    </aside>

    <button id="btnTogglePanel" class="panelToggle" type="button" title="Ocultar panel" aria-label="Ocultar panel">☰</button>

    <!-- Bottom Playback Controls -->
    <div class="playbackControls">
      <div class="timelineRow">
        <input type="range" id="timelineSlider" class="timelineSlider" min="0" max="100" value="0" step="0.01">
      </div>

      <div class="buttonsRow">
        <div class="leftGroup">
          <button id="btnRewind" class="skipBtn" type="button" title="Retroceder 10 segundos">-10s</button>
          <button id="btnPlayPause" class="playBtn">▶</button>
          <button id="btnForward" class="skipBtn" type="button" title="Adelantar 10 segundos">+10s</button>
          <div class="speedSelector">
            <label>Velocidad:</label>
            <select id="playbackSpeed">
              <option value="1">1x</option>
              <option value="2">2x</option>
              <option value="5">5x</option>
              <option value="10">10x</option>
              <option value="20">20x</option>
              <option value="50">50x</option>
            </select>
          </div>
        </div>

        <div class="centerGroup">
          <div id="currentDateDisplay" class="currentDate">--/--/----</div>
        </div>

        <div class="rightGroup">
          <button id="btnReset" class="btnSecondary">Reiniciar</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/historial.js" type="module"></script>
</body>

</html>
