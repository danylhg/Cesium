<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asignación</title>
  <script src="js/auth_check.js"></script>
  <link rel="stylesheet" href="css/asignacion.css" />
</head>

<body>

  <header class="topbar">
    <div class="topLeft">
      <span class="pill" id="lblUsuario"></span>
      <span class="opName">Operación: <strong id="lblOperacion">—</strong></span>
    </div>

    <button class="btnGhost" id="btnVolver">Volver</button>
  </header>

  <main class="wrap">
    <section class="shell">
      <div class="cols">

        <aside class="card leftCard" id="leftCard">
          <div class="cardTitle" id="leftCardTitle">Información de operación</div>

          <div id="leftCardContent">
            <div class="form" id="opInfoForm">
              <label class="lbl">Nombre</label>
              <input class="inp" id="opNombre" placeholder="Nombre de la operación" />

              <label class="lbl">Descripción</label>
              <textarea class="inp area" id="opDesc" placeholder="Descripción de la operación"></textarea>

              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 6px;">
                <label class="lbl" style="margin-bottom:0;">Fecha de inicio de operación</label>
                <button type="button" class="btnGhost" id="btnHoy"
                  style="padding: 2px 8px; font-size: 11px; height: auto;">Hoy</button>
              </div>
              <input class="inp" type="date" id="opInicio" />

              <label class="lbl">Hora de inicio de operación</label>
              <input class="inp" type="text" id="opHoraInicio" placeholder="HH:MM (24H)" maxlength="5" list="opHoraInicioList" autocomplete="off" />
              <datalist id="opHoraInicioList">
                <option value="00:00"></option>
                <option value="01:00"></option>
                <option value="02:00"></option>
                <option value="03:00"></option>
                <option value="04:00"></option>
                <option value="05:00"></option>
                <option value="06:00"></option>
                <option value="07:00"></option>
                <option value="08:00"></option>
                <option value="09:00"></option>
                <option value="10:00"></option>
                <option value="11:00"></option>
                <option value="12:00"></option>
                <option value="13:00"></option>
                <option value="14:00"></option>
                <option value="15:00"></option>
                <option value="16:00"></option>
                <option value="17:00"></option>
                <option value="18:00"></option>
                <option value="19:00"></option>
                <option value="20:00"></option>
                <option value="21:00"></option>
                <option value="22:00"></option>
                <option value="23:00"></option>
              </datalist>

              <label class="lbl">Prioridad</label>
              <select class="inp" id="opPrioridad">
                <option value="" selected>Seleccionar prioridad</option>
                <option value="BAJA">Baja</option>
                <option value="MEDIA">Media</option>
                <option value="ALTA">Alta</option>
              </select>
            </div>

            <div id="vehiculosLeft" style="display:none;"></div>
          </div>
        </aside>

        <div class="divider"></div>

        <section class="card rightCard">
          <div class="rightHeader">
            <div class="rightTitle" id="rightTitle">Asignar</div>

            <button class="btnCircle" id="btnBack" title="Regresar" aria-label="Regresar">
              ←
            </button>
          </div>

          <div class="panel" id="panel"></div>

          <div class="rightFooter">
            <button class="btnPrimary" id="btnAccion">Siguiente</button>
            <p class="hint" id="rightHint"></p>
          </div>
        </section>

      </div>
    </section>
  </main>

  <div id="dashboardWrap" style="display:none; justify-content:center; margin: 18px 0 28px;">
    <button id="btnDashboardGo" class="btnPrimary" style="max-width: 280px;">
      Panorama táctico →
    </button>
  </div>

  <script type="module" src="js/asignacion/asignacion.main.js"></script>
</body>

</html>
