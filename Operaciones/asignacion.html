<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Asignación</title>
  <link rel="stylesheet" href="css/asignacion.css" />
</head>
<body>

  <!-- Topbar -->
  <header class="topbar">
    <div class="brand">
      <div class="logo"></div>
      <div class="brandText">
        <div class="brandName">Centro de Operaciones</div>
        <div class="brandSub">Asignaciones</div>
      </div>
    </div>

    <div class="topRight">
      <div class="pillTop" id="opBadge">Operación: —</div>
      <button id="btnBack" class="btnTop">Volver</button>
    </div>
  </header>

  <!-- Background accents -->
  <div class="bgOrbs" aria-hidden="true">
    <span class="orb orb1"></span>
    <span class="orb orb2"></span>
    <span class="orb orb3"></span>
  </div>

  <main class="wrap">

    <section class="shell">
      <div class="shellGrid">

        <!-- LEFT -->
        <aside class="panel">
          <div class="panelHeader">
            <div class="pill">Información de operación</div>
          </div>

          <div class="form">
            <label class="lbl">Nombre</label>
            <input id="opName" class="inp" type="text" placeholder="Nombre de la operación" />

            <label class="lbl">Descripción</label>
            <textarea id="opDesc" class="txt" placeholder="Descripción de la operación"></textarea>

            <label class="lbl">Fecha de creación</label>
            <input id="opDateCreated" class="inp" type="date" />

            <label class="lbl">Fecha de inicio de operación</label>
            <input id="opDateStart" class="inp" type="date" />

            <label class="lbl">Fecha de fin de operación</label>
            <input id="opDateEnd" class="inp" type="date" />

            <button id="btnFinalize" class="btn primary full">Finalizar creación inicial</button>
            <div class="hint">Captura el nombre, la descripción y las fechas para crear la operación.</div>
            <div id="leftMsg" class="msg"></div>
          </div>
        </aside>

        <!-- DIVIDER -->
        <div class="divider" aria-hidden="true"></div>

        <!-- RIGHT -->
        <section class="panel">
          <div class="panelHeader rowBetween">
            <div class="titleBar" id="rightTitle">Asignar</div>

            <button id="btnRightBack" class="iconBtn hidden" title="Regresar">
              ←
            </button>
          </div>

          <!-- Sub title line (CUT: X) -->
          <div id="subLine" class="subLine hidden"></div>

          <!-- Right content (dynamic) -->
          <div class="rightBody" id="rightBody"></div>

          <button id="btnRightAction" class="btn primary full">Siguiente</button>
          <div id="rightMsg" class="msg"></div>
        </section>

      </div>
    </section>

  </main>

  <script src="js/asignacion.js"></script>
</body>
</html>
