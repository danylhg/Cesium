<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Control de Vehículos</title>
  <script src="js/auth_check.js"></script>
  <link rel="stylesheet" href="css/control_personal.css" />

  <style>
    .tbl tbody tr {
      cursor: pointer;
    }

    .tbl tbody tr:hover {
      background: rgba(76, 110, 245, 0.06);
    }

    .tbl tbody tr.selected {
      background: rgba(76, 110, 245, 0.14);
    }

    .vehThumb {
      width: 54px;
      height: 38px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,.08);
      display: block;
    }

    .dropZonePreview {
      margin-top: 10px;
      width: 100%;
      max-height: 180px;
      object-fit: contain;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,.08);
      background: #fff;
      display: none;
    }

    .dropZonePreview.show {
      display: block;
    }

    .dropZoneText {
      color: rgba(11,18,32,.65);
      font-size: 14px;
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <div class="logo"></div>
      <div class="brandText">
        <div class="brandName">Centro de Operaciones</div>
        <div class="brandSub">Control de vehículos</div>
      </div>
    </div>

    <div class="topActions">
      <button id="btnBack" class="btnTop">Volver</button>
      <button id="btnLogout" class="btnTop">Cerrar sesión</button>
    </div>
  </header>

  <div class="bgOrbs" aria-hidden="true">
    <span class="orb orb1"></span>
    <span class="orb orb2"></span>
    <span class="orb orb3"></span>
  </div>

  <main class="wrap">
    <section class="panel">
      <div class="panelHead">
        <div>
          <h1 class="title">Control de Vehículos</h1>
          <p class="subtitle">Administra vehículos registrados (localStorage)</p>
        </div>

        <div class="headBtns">
          <button id="btnAdd" class="btn primary">
            <span class="btnIcon">＋</span>
            Agregar
          </button>

          <button id="btnEdit" class="btn soft" disabled>
            <span class="btnIcon">✎</span>
            Modificar
          </button>

          <button id="btnDelete" class="btn danger" disabled>
            <span class="btnIcon">🗑</span>
            Eliminar
          </button>
        </div>
      </div>

      <div class="filtersCard">
        <div class="field">
          <label>Buscar</label>
          <div class="searchRow">
            <div class="searchWrap" tabindex="0">
              <button class="searchIcon" id="btnSearch" type="button" aria-label="Buscar"><span class="btnIcon miniIcon">⌕</span></button>
              <input id="searchInput" type="text" placeholder="Buscar por código, alias, tipo..." />
              <button id="btnClear" class="btn mini" type="button">Limpiar</button>
            </div>
          </div>
        </div>

        <div class="grid3">
          <div class="field">
            <label>Filtro por Tipo</label>
            <select id="filterTipo">
              <option value="">Todos</option>
              <option value="coche">coche</option>
              <option value="camioneta">camioneta</option>
              <option value="camión">camión</option>
              <option value="moto">moto</option>
              <option value="helicóptero">helicóptero</option>
              <option value="lancha">lancha</option>
              <option value="otro">otro</option>
            </select>
          </div>
        </div>

        <div class="hintRow">
          <span id="resultHint" class="hint"></span>
          <span class="hint">Tip: da clic en una fila para seleccionarla.</span>
        </div>
      </div>

      <div class="tableCard">
        <div class="tableWrap">
          <table class="tbl">
            <thead>
              <tr>
                <th>Imagen</th>
                <th>Código interno</th>
                <th>Tipo</th>
                <th>Alias</th>
                <th>Estado</th>
                <th>Capacidad</th>
                <th>Fecha registro</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <div id="modal" class="modal hidden" aria-hidden="true">
      <div class="modalBackdrop" data-close="true"></div>

      <div class="modalCard" role="dialog" aria-modal="true">
        <div class="modalHead">
          <div class="modalTitle" id="modalTitle">Agregar vehículo</div>
          <button class="iconBtn" id="btnCloseModal" title="Cerrar">✕</button>
        </div>

        <form id="form" class="modalBody">
          <div class="grid2">
            <div class="field">
              <label>Imagen del vehículo</label>
              <div id="dropZone" class="dropZone">
                <div class="dropZoneText">Haz clic o arrastra una imagen aquí</div>
                <input id="fImagenVeh" type="file" accept="image/*" hidden />
                <img id="previewImg" class="dropZonePreview" alt="Vista previa">
              </div>
            </div>

            <div class="field">
              <label>Código interno</label>

              <div style="display:flex; gap:10px; align-items:center;">
                <select id="fCodigoPrefijo" style="max-width:140px;">
                  <option value="VT-">VT-</option>
                  <option value="AM-">AM-</option>
                  <option value="AV-">AV-</option>
                  <option value="OTRO">Otro</option>
                </select>

                <input
                  id="fCodigoOtro"
                  type="text"
                  maxlength="10"
                  placeholder="Prefijo"
                  style="display:none; max-width:120px;"
                />

                <input
                  id="fCodigoNumero"
                  type="number"
                  min="1"
                  step="1"
                  required
                  placeholder="Número"
                />
              </div>
            </div>

            <div class="field">
              <label>Tipo</label>
              <select id="fTipo" required>
                <option value="" disabled selected>Selecciona...</option>
                <option value="coche">coche</option>
                <option value="camioneta">camioneta</option>
                <option value="camión">camión</option>
                <option value="moto">moto</option>
                <option value="helicóptero">helicóptero</option>
                <option value="lancha">lancha</option>
                <option value="otro">otro</option>
              </select>
            </div>

            <div class="field">
              <label>Alias</label>
              <input id="fAlias" type="text" maxlength="50" />
            </div>

            <div class="field">
              <label>Estado</label>
              <select id="fEstado">
                <option value="DISPONIBLE">DISPONIBLE</option>
                <option value="ASIGNADO">ASIGNADO</option>
                <option value="MANTENIMIENTO">MANTENIMIENTO</option>
                <option value="FUERA DE SERVICIO">FUERA DE SERVICIO</option>
              </select>
            </div>

            <div class="field">
              <label>Capacidad</label>
              <input id="fCapacidad" type="number" min="1" step="1" />
            </div>
          </div>

          <div class="modalActions">
            <button type="button" id="btnDeleteModal" class="btn danger"><span class="btnIcon">🗑</span>Eliminar</button>
            <button type="submit" id="btnSave" class="btn primary">
              <span class="btnIcon">✔</span>
              Guardar
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="js/control_vehiculos.js"></script>
</body>
</html>
