<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menú inicial</title>
  <script src="js/auth_check.js"></script>
  <link rel="stylesheet" href="css/menu_inicial.css" />
</head>

<body>

  <!-- Topbar -->
  <header class="topbar">
    <div class="brand">
      <img src="img/logo_sedam.jpeg" alt="Logo" class="logo" />
      <div class="brandText">
        <div class="brandName">Usuario: <span id="userName">Invitado</span></div>
        <div class="brandSub">Panel administrativo</div>
      </div>
    </div>

    <button id="btnLogout" class="btnTop">
      Cerrar sesión
    </button>
  </header>

  <!-- Main -->
  <main class="wrap">
    <section class="hero">
      <h1 class="title">Menú de Operaciones</h1>
      <p class="subtitle">Seleccione una opción para continuar</p>

      <div class="card">
        <div class="cardHeader">
          <div class="pill">Bienvenido(a)</div>
          <div class="cardTitle">¿Qué desea hacer?</div>
        </div>

        <div class="actions">
          <button id="btnCreate" class="btn primary">
            <span class="btnIcon">＋</span>
            Crear operación
          </button>

          <button id="btnEmergency" class="btn danger">
            <span class="btnIcon">!</span>
            Operación de emergencia
          </button>

          <button id="btnSelect" class="btn soft">
            <span class="btnIcon">≡</span>
            Seleccionar operación
          </button>

          <button id="btnPersonal" class="btn soft">
            Sistema de control
          </button>
        </div>

        <div id="submenuControl" class="submenu hidden">
          <ul>
            <li id="btnControlPersonal">Control de personal</li>
            <li id="btnControlVehiculos">Control de vehículos</li>
            <li id="btnControlEquipos">Control de equipos</li>
          </ul>
        </div>

        <div id="opsList" class="ops hidden">
          <div class="opsHead">
            <span class="opsTitle">Operaciones existentes</span>
            <span class="opsHint">clic para abrir</span>
          </div>
          <ul id="opsUl" class="opsUl"></ul>
        </div>
      </div>
    </section>
  </main>

  <script src="js/menu_inicial.js"></script>
</body>

</html>
