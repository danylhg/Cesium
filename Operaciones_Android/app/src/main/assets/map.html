<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      background: #0a0f1e;
      overflow: hidden;
    }
    .cesium-widget-credits { display: none !important; }
  </style>
</head>
<body>
<div id="cesiumContainer"></div>

<script>
  let viewer = null;

  try {
    viewer = new Cesium.Viewer('cesiumContainer', {
      baseLayer: new Cesium.ImageryLayer(
        new Cesium.OpenStreetMapImageryProvider({
          url: 'https://tile.openstreetmap.org/'
        })
      ),
      terrainProvider: new Cesium.EllipsoidTerrainProvider(),
      timeline: false,
      animation: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      fullscreenButton: false,
      infoBox: false,
      selectionIndicator: false
    });

    window.setOperationView = function(lat, lon, zoomMeters) {
      try {
        console.log("setOperationView:", lat, lon, zoomMeters);

        if (!viewer) return;

      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(
          lon,
          lat,
          zoomMeters || 15000
        ),
        duration: 2.5
      });
      } catch (e) {
        console.error("Error en setOperationView: " + e.message);
      }
    };

    if (window.Android && Android.sendTrafficAlert) {
      Android.sendTrafficAlert("Mapa listo");
    }

    console.log("Cesium OK");
  } catch(e) {
    console.error("Error: " + e.message);
    document.body.innerHTML =
      '<div style="color:#ef4444;padding:20px;font-family:monospace;background:#0a0f1e">Error: ' + e.message + '</div>';
  }

  let userMarker = null;

  window.updateMyPosition = function(lat, lon) {
    try {
      if (!viewer) return;

      // eliminar marcador anterior
      if (userMarker) {
        viewer.entities.remove(userMarker);
      }

      userMarker = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(lon, lat),
        point: {
          pixelSize: 12,
          color: Cesium.Color.LIME,
          outlineColor: Cesium.Color.BLACK,
          outlineWidth: 2
        }
      });

    } catch(e) {
      console.error("Error updateMyPosition:", e);
    }
  };
</script>
</body>
</html>
