<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <script src="milsymbol.min.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body,
    #cesiumContainer {
      width: 100%;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
    }

    .cesium-widget-credits {
      display: none !important;
    }

    /* ── Rosa del norte ────────────────────────────────── */
    #compassRose {
      position: fixed;
      right: 16px;
      bottom: 72px; /* encima de la barra de navegación nativa (56dp) */
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: rgba(13, 21, 38, 0.84);
      border: 2px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
      z-index: 900;
      pointer-events: none;
      transition: transform 0.12s ease-out;
    }

    #compassRose::before,
    #compassRose::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.70);
    }

    #compassRose::before { width: 2px; height: 68px; }
    #compassRose::after  { width: 68px; height: 2px; }

    #compassCore {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff7b00;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px rgba(255, 123, 0, 0.7);
    }

    .compass-label {
      position: absolute;
      font-weight: 900;
      font-size: 12px;
      font-family: sans-serif;
      color: #ffffff;
      text-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
    }

    #compassN { top: 3px;    left: 50%; transform: translateX(-50%); color: #ff7b00; }
    #compassS { bottom: 3px; left: 50%; transform: translateX(-50%); }
    #compassE { right: 5px;  top: 50%;  transform: translateY(-50%); }
    #compassW { left: 5px;   top: 50%;  transform: translateY(-50%); }
  </style>
</head>

<body>
  <div id="cesiumContainer"></div>

  <!-- Rosa del norte (rota con la cámara vía postRender) -->
  <div id="compassRose">
    <div id="compassCore"></div>
    <span class="compass-label" id="compassN">N</span>
    <span class="compass-label" id="compassS">S</span>
    <span class="compass-label" id="compassE">E</span>
    <span class="compass-label" id="compassW">W</span>
  </div>

  <script>
    let viewer = null;
    let userMarker = null;

    // Escala íconos/etiquetas con la distancia de la cámara:
    // cerca (1 km) → ×1.5 ; lejos (2 000 km) → ×0.1
    const SCALE_BY_DIST = new Cesium.NearFarScalar(1e3, 1.0, 2e6, 0.04);

    // =========================
    // Estado de rutas
    // =========================
    let pickMode = null; // "start" | "end" | null
    let startPoint = null;
    let endPoint = null;
    let lastRoute = null;

    let startEntity = null;
    let endEntity = null;
    let routeEntity = null;

    let remoteRoutes = new Map();

    const OSRM_BASE = "https://router.project-osrm.org";

    function notifyAndroid(message) {
      try {
        if (window.Android && typeof Android.sendTrafficAlert === "function") {
          Android.sendTrafficAlert(String(message));
        }
      } catch (e) {
        console.error("Error notificando a Android: " + e.message);
      }
    }

    function notifyMapTap(lat, lon) {
      try {
        if (window.Android && typeof Android.onMapTapped === "function") {
          Android.onMapTapped(lat, lon);
        }
      } catch (e) {
        console.error("Error notificando tap a Android: " + e.message);
      }
    }

    function notifyRouteCreated(route) {
      try {
        if (!route || !route.geometry || !Array.isArray(route.geometry.coordinates)) {
          console.error("Ruta inválida para enviar a Android");
          return;
        }

        if (!startPoint || !endPoint) {
          console.error("No hay origen/destino para enviar ruta a Android");
          return;
        }

        const payload = {
          geojson: route.geometry,
          origen_lat: startPoint.lat,
          origen_lon: startPoint.lon,
          destino_lat: endPoint.lat,
          destino_lon: endPoint.lon,
          distancia_m: Number(route.distance) || 0,
          duracion_s: Number(route.duration) || 0
        };

        console.log("Enviando ruta a Android:", payload);

        if (window.Android && typeof Android.onRouteCreated === "function") {
          Android.onRouteCreated(JSON.stringify(payload));
        } else {
          console.warn("Android.onRouteCreated no está disponible");
        }
      } catch (e) {
        console.error("Error notificando ruta a Android: " + e.message);
      }
    }

    try {
      // =================== TOKEN CESIUM ION ===================
      Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJmMjQ3NDAzYi1mNDYyLTQzYTgtOTNiOC02MGE1YmJhOGYwYjQiLCJpZCI6NDAwOTM3LCJpYXQiOjE3NzQ1NDYwNjZ9.Phla8axJI8tGCSQwfvmvykzxW2tHXcuc0q1D5n01BmU";
      viewer = new Cesium.Viewer('cesiumContainer', {
        baseLayer: new Cesium.ImageryLayer(
          new Cesium.UrlTemplateImageryProvider({
            url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
            subdomains: 'abcd',
            credit: '© OpenStreetMap contributors, © CARTO'
          })
        ),
        terrainProvider: new Cesium.EllipsoidTerrainProvider(),
        timeline: false,
        animation: false,
        baseLayerPicker: false,
        geocoder: false,
        homeButton: false,
        sceneModePicker: false,
        navigationHelpButton: false,
        fullscreenButton: false,
        infoBox: false,
        selectionIndicator: false
      });

      // Vista limpia más tipo 2D táctico
      viewer.scene.skyBox.show = false;
      viewer.scene.skyAtmosphere.show = false;
      viewer.scene.sun.show = false;
      viewer.scene.moon.show = false;

      // Handler de clicks
      const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
      handler.setInputAction((movement) => {
        try {
          if (!viewer) return;

          const cartesian = viewer.camera.pickEllipsoid(
            movement.position,
            viewer.scene.globe.ellipsoid
          );

          if (!cartesian) return;

          const cartographic = Cesium.Cartographic.fromCartesian(cartesian);
          const lat = Cesium.Math.toDegrees(cartographic.latitude);
          const lon = Cesium.Math.toDegrees(cartographic.longitude);

          if (pickMode === "start") {
            setStartPoint(lat, lon);
            pickMode = null;
            notifyAndroid("Origen seleccionado");
            return;
          }

          if (pickMode === "end") {
            setEndPoint(lat, lon);
            pickMode = null;
            notifyAndroid("Destino seleccionado");
            return;
          }

          // Click normal, se mantiene tu flujo actual
          notifyMapTap(lat, lon);
        } catch (e) {
          console.error("Error en click del mapa: " + e.message);
          notifyAndroid("Error en el click del mapa: " + e.message);
        }
      }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

      if (window.Android && typeof Android.sendTrafficAlert === 'function') {
        Android.sendTrafficAlert("Mapa listo");
      }

      // Rota la rosa del norte para que N siempre apunte al norte geográfico
      const _compassEl = document.getElementById('compassRose');
      if (_compassEl) {
        viewer.scene.postRender.addEventListener(function () {
          const deg = Cesium.Math.toDegrees(viewer.camera.heading);
          _compassEl.style.transform = 'rotate(' + (-deg) + 'deg)';
        });
      }

      console.log("Cesium OK");
    } catch (e) {
      console.error("Error iniciando Cesium: " + e.message);
      document.body.innerHTML =
        '<div style="color:#ef4444;padding:20px;font-family:monospace;background:#0a0f1e">Error: ' + e.message + '</div>';
    }

    // =========================
    // Funciones actuales
    // =========================
    window.setOperationView = function (lat, lon, zoomMeters) {
      try {
        if (!viewer) return;
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(lon, lat, zoomMeters || 15000),
          duration: 2.5
        });
      } catch (e) {
        console.error("Error en setOperationView: " + e.message);
      }
    };

    window.updateMyPosition = function (lat, lon) {
      try {
        if (!viewer) return;
        if (userMarker) viewer.entities.remove(userMarker);

        userMarker = viewer.entities.add({
          position: Cesium.Cartesian3.fromDegrees(lon, lat),
          point: {
            pixelSize: 10,
            color: Cesium.Color.LIME.withAlpha(0.15),
            outlineColor: Cesium.Color.BLACK,
            outlineWidth: 3,
            disableDepthTestDistance: Number.POSITIVE_INFINITY,
            scaleByDistance: new Cesium.NearFarScalar(1e3, 1.0, 2e6, 0.8)
          }
        });
      } catch (e) {
        console.error("Error en updateMyPosition: " + e.message);
      }
    };

    // =========================
    // Rutas - selección
    // =========================
    function setStartPoint(lat, lon) {
      startPoint = { lat, lon };
      lastRoute = null;

      if (routeEntity) {
        viewer.entities.remove(routeEntity);
        routeEntity = null;
      }

      if (startEntity) {
        viewer.entities.remove(startEntity);
      }

      startEntity = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(lon, lat),
        point: {
          pixelSize: 12,
          color: Cesium.Color.LIME,
          outlineColor: Cesium.Color.BLACK,
          outlineWidth: 2,
          scaleByDistance: SCALE_BY_DIST
        },
        label: {
          text: "ORIGEN",
          font: "14px sans-serif",
          fillColor: Cesium.Color.WHITE,
          outlineColor: Cesium.Color.BLACK,
          outlineWidth: 3,
          style: Cesium.LabelStyle.FILL_AND_OUTLINE,
          pixelOffset: new Cesium.Cartesian2(0, -24),
          scaleByDistance: SCALE_BY_DIST
        }
      });
    }

    function setEndPoint(lat, lon) {
      endPoint = { lat, lon };
      lastRoute = null;

      if (routeEntity) {
        viewer.entities.remove(routeEntity);
        routeEntity = null;
      }

      if (endEntity) {
        viewer.entities.remove(endEntity);
      }

      endEntity = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(lon, lat),
        point: {
          pixelSize: 12,
          color: Cesium.Color.YELLOW,
          outlineColor: Cesium.Color.BLACK,
          outlineWidth: 2,
          scaleByDistance: SCALE_BY_DIST
        },
        label: {
          text: "DESTINO",
          font: "14px sans-serif",
          fillColor: Cesium.Color.WHITE,
          outlineColor: Cesium.Color.BLACK,
          outlineWidth: 3,
          style: Cesium.LabelStyle.FILL_AND_OUTLINE,
          pixelOffset: new Cesium.Cartesian2(0, -24),
          scaleByDistance: SCALE_BY_DIST
        }
      });
    }

    window.setRouteStart = function (lat, lon) {
      try {
        setStartPoint(lat, lon);

        if (startPoint && endPoint) {
          calculateRouteSilently();
        }
      } catch (e) {
        console.error("Error en setRouteStart: " + e.message);
      }
    };

    window.setRouteEnd = function (lat, lon) {
      try {
        setEndPoint(lat, lon);

        if (startPoint && endPoint) {
          calculateRouteSilently();
        }
      } catch (e) {
        console.error("Error en setRouteEnd: " + e.message);
      }
    };

    window.enablePickStart = function () {
      pickMode = "start";
      notifyAndroid("Modo origen activo");
    };

    window.enablePickEnd = function () {
      pickMode = "end";
      notifyAndroid("Modo destino activo");
    };

    // =========================
    // Rutas - OSRM
    // =========================
    async function getOsrmRoute(start, end) {
      const url =
        `${OSRM_BASE}/route/v1/driving/` +
        `${start.lon},${start.lat};${end.lon},${end.lat}` +
        `?overview=full&geometries=geojson`;

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 900000);

      try {
        const response = await fetch(url, {
          signal: controller.signal
        });

        if (!response.ok) {
          throw new Error("No se pudo obtener ruta");
        }

        const data = await response.json();

        if (!data.routes || !data.routes.length) {
          throw new Error("No hay ruta disponible");
        }

        return data.routes[0];
      } catch (err) {
        if (err.name === "AbortError") {
          throw new Error("La consulta de ruta tardó demasiado");
        }
        throw err;
      } finally {
        clearTimeout(timeoutId);
      }
    }

    function drawRouteOnCesium(geojsonLineString) {
      if (!viewer || !geojsonLineString || !Array.isArray(geojsonLineString.coordinates)) {
        return;
      }

      const positions = geojsonLineString.coordinates.map(([lon, lat]) =>
        Cesium.Cartesian3.fromDegrees(lon, lat)
      );

      if (routeEntity) {
        viewer.entities.remove(routeEntity);
      }

      routeEntity = viewer.entities.add({
        polyline: {
          positions,
          width: 5,
          material: Cesium.Color.CYAN.withAlpha(0.9),
          clampToGround: true
        }
      });
    }

    async function calculateRouteSilently() {
      try {
        if (!startPoint || !endPoint) return;

        console.log("1. Entró a calculateRouteSilently", Date.now());
        console.log("startPoint:", startPoint);
        console.log("endPoint:", endPoint);

        const route = await getOsrmRoute(startPoint, endPoint);

        console.log("2. OSRM respondió", Date.now(), route);

        if (!route || !route.geometry || route.geometry.type !== "LineString") {
          throw new Error("La ruta regresó vacía o sin geometry válida");
        }

        lastRoute = route;

        drawRouteOnCesium(route.geometry);
        notifyRouteCreated(route);

        console.log("3. Ruta dibujada y enviada al backend", Date.now());
      } catch (e) {
        console.error("Error calculando ruta:", e);
      }
    }

    window.calculateRoute = async function () {
      try {
        if (!startPoint || !endPoint) {
          notifyAndroid("Selecciona origen y destino primero");
          return;
        }

        notifyAndroid("Calculando ruta...");

        const route = await getOsrmRoute(startPoint, endPoint);
        lastRoute = route;

        drawRouteOnCesium(route.geometry);


        const km = route.distance / 1000;
        const min = route.duration / 60;

        notifyAndroid(
          `Ruta lista. Distancia: ${km.toFixed(2)} km · Tiempo: ${min.toFixed(1)} min`
        );
      } catch (e) {
        console.error("Error calculando ruta: " + e.message);
        notifyAndroid("Error calculando ruta: " + e.message);
      }
    };

    window.clearRoute = function () {
      try {
        pickMode = null;
        startPoint = null;
        endPoint = null;
        lastRoute = null;

        if (routeEntity) {
          viewer.entities.remove(routeEntity);
          routeEntity = null;
        }

        if (startEntity) {
          viewer.entities.remove(startEntity);
          startEntity = null;
        }

        if (endEntity) {
          viewer.entities.remove(endEntity);
          endEntity = null;
        }
      } catch (e) {
        console.error("Error limpiando ruta: " + e.message);
        notifyAndroid("Error limpiando ruta: " + e.message);
      }
    };

    // =========================
    // Helpers opcionales
    // =========================
    window.getRouteState = function () {
      return {
        startPoint,
        endPoint,
        lastRoute
      };
    };

    // =========================
    // Rutas Remotas (Sincronización)
    // =========================
    window.loadRemoteRoutes = function (routesArray) {
      if (!Array.isArray(routesArray)) return;
      routesArray.forEach(ruta => {
        if (!remoteRoutes.has(ruta.id_ruta)) {
          drawRemoteRoute(ruta);
        }
      });
    };

    window.drawRemoteRoute = function (rutaObj) {
      if (!rutaObj || !rutaObj.geojson) return;

      const geojson = typeof rutaObj.geojson === 'string' ? JSON.parse(rutaObj.geojson) : rutaObj.geojson;
      const id = rutaObj.id_ruta;
      const rol = (rutaObj.rol_creador || "").toUpperCase();

      // Color logic: ADMIN/CUT = rojo, CET = naranja, CELL = azul, resto = violeta
      let colorCesium = Cesium.Color.PURPLE;
      if (rol === "ADMIN" || rol === "CUT") colorCesium = Cesium.Color.RED;
      else if (rol === "CET") colorCesium = Cesium.Color.ORANGE;
      else if (rol === "CELL") colorCesium = Cesium.Color.DODGERBLUE;

      let coords = [];
      if (geojson.coordinates && geojson.coordinates.length > 0) {
        coords = geojson.coordinates.map(c => Cesium.Cartesian3.fromDegrees(c[0], c[1]));
      }

      if (coords.length > 0) {
        const lineEntity = viewer.entities.add({
          id: "remote_route_" + id,
          polyline: {
            positions: coords,
            width: 5,
            material: new Cesium.PolylineGlowMaterialProperty({
              glowPower: 0.1,
              color: colorCesium
            }),
            clampToGround: true
          }
        });
        remoteRoutes.set(id, lineEntity);
      }
    };

    window.removeRemoteRoute = function (id_ruta) {
      const lineEntity = remoteRoutes.get(id_ruta);
      if (lineEntity) {
        viewer.entities.remove(lineEntity);
        remoteRoutes.delete(id_ruta);
      }
    };

    // =========================
    // Puntos de Interés (POI)
    // =========================
    const poiEntities = new Map(); // id_poi → entity
    const structureEntities = new Map();
    const areaEntities = new Map();
    let operationZoneEntity = null;
    const operationZoneRoseEntities = [];

    function getMilSymbolCanvas(sidc) {
      try {
        if (!sidc || typeof ms === 'undefined' || typeof ms.Symbol !== 'function') return null;
        return new ms.Symbol(sidc, { size: 130, colorMode: 'Light' }).asCanvas();
      } catch (e) {
        console.error('[POI][WEB] Error creando milsymbol: ' + e.message);
        return null;
      }
    }

    window.addPoiToMap = function (id, lat, lon, nombre, tipoPoi, color, iconoSrc, sidc) {
      try {
        if (!viewer) return;

        const hexColor = (color && color.startsWith('#')) ? color : '#FFD700';
        const cesiumColor = Cesium.Color.fromCssColorString(hexColor);
        const rawLabel = nombre || 'PDI';
        const label = String((tipoPoi || '').toUpperCase() === 'MIL' ? rawLabel.replace(/\s\d{17}$/, '') : rawLabel);
        const entityId = 'poi_' + id;
        const normalizedIconoSrc = (typeof iconoSrc === 'string') ? iconoSrc.trim() : iconoSrc;
        const normalizedSidc = (typeof sidc === 'string') ? sidc.trim() : sidc;
        const milCanvas = getMilSymbolCanvas(normalizedSidc || (normalizedIconoSrc && normalizedIconoSrc.startsWith('S') ? normalizedIconoSrc : null));
        const useImageSrc = !!normalizedIconoSrc &&
          normalizedIconoSrc !== 'null' &&
          !normalizedIconoSrc.endsWith('/null');
        const billboardImage = milCanvas || (useImageSrc ? normalizedIconoSrc : null);
        const useBillboard = !!billboardImage;
        const billboardScale = milCanvas ? 0.28 : 0.05;

        console.log('[POI][WEB] addPoiToMap in', JSON.stringify({
          id, lat, lon, nombre, tipoPoi, color, iconoSrc: normalizedIconoSrc, sidc: normalizedSidc, useBillboard
        }));

        if (poiEntities.has(entityId)) {
          viewer.entities.remove(poiEntities.get(entityId));
          poiEntities.delete(entityId);
        }

        // Los símbolos militares (SIDC) tienen tamaño fijo en pantalla —
        // no escalan con el zoom. Otros iconos/puntos sí usan scaleByDistance.
        const isMilSymbol = !!milCanvas;

        const entity = viewer.entities.add({
          id: entityId,
          position: Cesium.Cartesian3.fromDegrees(lon, lat),
          billboard: useBillboard ? {
            image: billboardImage,
            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
            scale: billboardScale,
            scaleByDistance: isMilSymbol ? undefined : SCALE_BY_DIST,
            disableDepthTestDistance: Number.POSITIVE_INFINITY
          } : undefined,
          point: !useBillboard ? {
            pixelSize: 10,
            color: cesiumColor,
            outlineColor: Cesium.Color.BLACK,
            outlineWidth: 2,
            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
            scaleByDistance: SCALE_BY_DIST,
            disableDepthTestDistance: Number.POSITIVE_INFINITY
          } : undefined,
          label: {
            text: label,
            font: '14px sans-serif',
            fillColor: Cesium.Color.WHITE,
            outlineColor: Cesium.Color.BLACK,
            outlineWidth: 3,
            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
            pixelOffset: useBillboard ? new Cesium.Cartesian2(0, 15) : new Cesium.Cartesian2(0, -20),
            showBackground: !useBillboard,
            backgroundColor: !useBillboard ? cesiumColor.withAlpha(0.7) : undefined,
            backgroundPadding: !useBillboard ? new Cesium.Cartesian2(6, 4) : undefined,
            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
            scaleByDistance: isMilSymbol ? undefined : SCALE_BY_DIST,
            disableDepthTestDistance: Number.POSITIVE_INFINITY
          }
        });

        console.log('[POI][WEB] entity created', JSON.stringify({
          entityId,
          hasBillboard: !!entity.billboard,
          hasPoint: !!entity.point,
          labelText: entity.label?.text?._value || label
        }));

        poiEntities.set(entityId, entity);
      } catch (e) {
        console.error('[POI][WEB] Error addPoiToMap: ' + e.message);
      }
    };

    window.loadPois = function (poisArray) {
      try {
        if (!Array.isArray(poisArray)) return;
        console.log('[POI][WEB] loadPois count=' + poisArray.length);
        poisArray.forEach(function (poi) {
          addPoiToMap(
            poi.id_poi,
            parseFloat(poi.latitud),
            parseFloat(poi.longitud),
            poi.nombre || 'PDI',
            poi.tipo_poi || '',
            poi.color || '#FFD700',
            poi.icono_src || null,
            poi.sidc || null
          );
        });
      } catch (e) {
        console.error('[POI][WEB] Error loadPois: ' + e.message);
      }
    };

    window.removePoiFromMap = function (id) {
      try {
        const entityId = 'poi_' + id;
        const entity = poiEntities.get(entityId);
        if (entity) {
          viewer.entities.remove(entity);
          poiEntities.delete(entityId);
        }
      } catch (e) {
        console.error('Error removePoiFromMap: ' + e.message);
      }
    };

    window.addStructureToMap = function (id, lat, lon, nombre, tipoEstructura, iconoSrc) {
      try {
        if (!viewer) return;

        const entityId = 'estructura_' + id;
        if (structureEntities.has(entityId)) {
          viewer.entities.remove(structureEntities.get(entityId));
          structureEntities.delete(entityId);
        }

        const tipo = String(tipoEstructura || '').toUpperCase();
        const isLabel = tipo === 'ETIQUETA';
        const normalizedIconoSrc = (typeof iconoSrc === 'string') ? iconoSrc.trim() : iconoSrc;
        const useBillboard = !isLabel && !!normalizedIconoSrc && normalizedIconoSrc !== 'null' && !normalizedIconoSrc.endsWith('/null');

        const entity = viewer.entities.add({
          id: entityId,
          position: Cesium.Cartesian3.fromDegrees(lon, lat, isLabel ? 8 : 0),
          billboard: useBillboard ? {
            image: normalizedIconoSrc,
            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
            scale: 0.05,
            scaleByDistance: SCALE_BY_DIST,
            disableDepthTestDistance: Number.POSITIVE_INFINITY
          } : undefined,
          point: (!isLabel && !useBillboard) ? {
            pixelSize: 12,
            color: Cesium.Color.YELLOW,
            outlineColor: Cesium.Color.BLACK,
            outlineWidth: 2,
            scaleByDistance: SCALE_BY_DIST,
            disableDepthTestDistance: Number.POSITIVE_INFINITY
          } : undefined,
          label: {
            text: nombre || (isLabel ? 'Etiqueta' : 'Estructura'),
            font: '12px sans-serif',
            fillColor: Cesium.Color.WHITE,
            outlineColor: Cesium.Color.BLACK,
            outlineWidth: 3,
            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
            pixelOffset: isLabel ? new Cesium.Cartesian2(0, -18) : new Cesium.Cartesian2(0, 8),
            showBackground: isLabel,
            backgroundColor: isLabel ? Cesium.Color.BLACK.withAlpha(0.75) : undefined,
            backgroundPadding: isLabel ? new Cesium.Cartesian2(6, 4) : undefined,
            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
            scaleByDistance: SCALE_BY_DIST,
            disableDepthTestDistance: Number.POSITIVE_INFINITY
          }
        });

        structureEntities.set(entityId, entity);
      } catch (e) {
        console.error('Error addStructureToMap: ' + e.message);
      }
    };

    window.loadStructures = function (structuresArray) {
      try {
        if (!Array.isArray(structuresArray)) return;
        structuresArray.forEach(function (structure) {
          addStructureToMap(
            structure.id_marca,
            parseFloat(structure.latitud),
            parseFloat(structure.longitud),
            structure.nombre || 'Estructura',
            structure.tipo_estructura || 'EDIFICIO',
            structure.icono_src || null
          );
        });
      } catch (e) {
        console.error('Error loadStructures: ' + e.message);
      }
    };

    window.removeStructureFromMap = function (id) {
      try {
        const entityId = 'estructura_' + id;
        const entity = structureEntities.get(entityId);
        if (entity) {
          viewer.entities.remove(entity);
          structureEntities.delete(entityId);
        }
      } catch (e) {
        console.error('Error removeStructureFromMap: ' + e.message);
      }
    };

    window.loadOperationZone = function (zoneObj) {
      try {
        if (!viewer || !zoneObj || !Array.isArray(zoneObj.points) || zoneObj.points.length < 3) return;

        // Limpiar zona anterior
        if (operationZoneEntity) {
          viewer.entities.remove(operationZoneEntity);
          operationZoneEntity = null;
        }
        operationZoneRoseEntities.forEach(e => viewer.entities.remove(e));
        operationZoneRoseEntities.length = 0;

        const hexColor = (zoneObj.color && String(zoneObj.color).startsWith('#')) ? zoneObj.color : '#3b82f6';
        const outline = Cesium.Color.fromCssColorString(hexColor);
        const closedPoints = [...zoneObj.points, zoneObj.points[0]];
        const positions = closedPoints.map(point =>
          Cesium.Cartesian3.fromDegrees(Number(point.lon), Number(point.lat))
        );

        operationZoneEntity = viewer.entities.add({
          id: 'zona_operacion_' + (zoneObj.id_zona || 'actual'),
          polyline: {
            positions,
            width: 3,
            material: new Cesium.PolylineDashMaterialProperty({
              color: outline,
              dashLength: 16
            }),
            clampToGround: true
          }
        });

        // ── Rosa de los vientos (cruz cardinal sobre el bounding box) ──
        const pts = zoneObj.points;
        let minLat = Infinity, maxLat = -Infinity;
        let minLon = Infinity, maxLon = -Infinity;
        pts.forEach(function (p) {
          const la = Number(p.lat), lo = Number(p.lon);
          if (la < minLat) minLat = la;
          if (la > maxLat) maxLat = la;
          if (lo < minLon) minLon = lo;
          if (lo > maxLon) maxLon = lo;
        });
        const cLat = (minLat + maxLat) / 2;
        const cLon = (minLon + maxLon) / 2;
        const lineColor = Cesium.Color.fromCssColorString('rgba(0,0,0,0.80)');

        // Línea E–W
        operationZoneRoseEntities.push(viewer.entities.add({
          polyline: {
            positions: Cesium.Cartesian3.fromDegreesArray([minLon, cLat, maxLon, cLat]),
            width: 3,
            material: lineColor,
            clampToGround: true
          }
        }));

        // Línea N–S
        operationZoneRoseEntities.push(viewer.entities.add({
          polyline: {
            positions: Cesium.Cartesian3.fromDegreesArray([cLon, minLat, cLon, maxLat]),
            width: 3,
            material: lineColor,
            clampToGround: true
          }
        }));

        // Etiquetas cardinales
        var cardinals = [
          { text: 'N', lat: maxLat, lon: cLon,   px: 0,   py: -18 },
          { text: 'S', lat: minLat, lon: cLon,   px: 0,   py:  18 },
          { text: 'E', lat: cLat,   lon: maxLon, px: 18,  py:  0  },
          { text: 'W', lat: cLat,   lon: minLon, px: -18, py:  0  }
        ];
        cardinals.forEach(function (c) {
          operationZoneRoseEntities.push(viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(c.lon, c.lat),
            label: {
              text: c.text,
              font: 'bold 22px monospace',
              fillColor: Cesium.Color.fromCssColorString('rgba(0,0,0,0.90)'),
              outlineColor: Cesium.Color.WHITE,
              outlineWidth: 3,
              style: Cesium.LabelStyle.FILL_AND_OUTLINE,
              pixelOffset: new Cesium.Cartesian2(c.px, c.py),
              heightReference: Cesium.HeightReference.CLAMP_TO_GROUND
            }
          }));
        });

      } catch (e) {
        console.error('Error loadOperationZone: ' + e.message);
      }
    };

    window.addCoverageCircleToMap = function (id, centerLat, centerLon, radiusM, nombre, color, opacity, outlineWidth) {
      try {
        if (!viewer) return;

        const entityId = 'area_' + id;
        if (areaEntities.has(entityId)) {
          viewer.entities.remove(areaEntities.get(entityId));
          areaEntities.delete(entityId);
        }

        const hexColor = (color && color.startsWith('#')) ? color : '#FF4500';
        const outline = Cesium.Color.fromCssColorString(hexColor);
        const fill = outline.withAlpha(Number.isFinite(opacity) ? opacity : 0.35);

        const entity = viewer.entities.add({
          id: entityId,
          position: Cesium.Cartesian3.fromDegrees(centerLon, centerLat),
          ellipse: {
            semiMajorAxis: radiusM,
            semiMinorAxis: radiusM,
            material: fill,
            outline: true,
            outlineColor: outline,
            outlineWidth: Number.isFinite(outlineWidth) ? outlineWidth : 3,
            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND
          },
          label: nombre ? {
            text: nombre,
            font: '12px sans-serif',
            fillColor: Cesium.Color.WHITE,
            outlineColor: Cesium.Color.BLACK,
            outlineWidth: 3,
            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
            pixelOffset: new Cesium.Cartesian2(0, -18),
            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND
          } : undefined
        });

        areaEntities.set(entityId, entity);
      } catch (e) {
        console.error('Error addCoverageCircleToMap: ' + e.message);
      }
    };

    window.loadCoverageCircles = function (circlesArray) {
      try {
        if (!Array.isArray(circlesArray)) return;
        circlesArray.forEach(function (circle) {
          addCoverageCircleToMap(
            circle.id_area,
            parseFloat(circle.center_lat),
            parseFloat(circle.center_lon),
            parseFloat(circle.radius_m),
            circle.nombre || 'Círculo de cobertura',
            circle.color || '#FF4500',
            Number(circle.opacity ?? 0.35),
            Number(circle.outline_width ?? 3)
          );
        });
      } catch (e) {
        console.error('Error loadCoverageCircles: ' + e.message);
      }
    };

    window.removeCoverageCircleFromMap = function (id) {
      try {
        const entityId = 'area_' + id;
        const entity = areaEntities.get(entityId);
        if (entity) {
          viewer.entities.remove(entity);
          areaEntities.delete(entityId);
        }
      } catch (e) {
        console.error('Error removeCoverageCircleFromMap: ' + e.message);
      }
    };

    window.addAreaPolygonToMap = function (id, nombre, points, color, opacity, outlineWidth) {
      try {
        if (!viewer) return;

        const entityId = 'area_' + id;
        if (areaEntities.has(entityId)) {
          viewer.entities.remove(areaEntities.get(entityId));
          areaEntities.delete(entityId);
        }
        if (!Array.isArray(points) || points.length < 3) return;

        const coords = points.map(function (point) {
          return Cesium.Cartesian3.fromDegrees(Number(point.lon), Number(point.lat));
        });
        const hexColor = (color && color.startsWith('#')) ? color : '#FFD700';
        const outline = Cesium.Color.fromCssColorString(hexColor);

        let sumLat = 0;
        let sumLon = 0;
        points.forEach(function (point) {
          sumLat += Number(point.lat) || 0;
          sumLon += Number(point.lon) || 0;
        });

        const entity = viewer.entities.add({
          id: entityId,
          position: Cesium.Cartesian3.fromDegrees(sumLon / points.length, sumLat / points.length),
          polygon: {
            hierarchy: coords,
            material: outline.withAlpha(Number.isFinite(opacity) ? opacity : 0.35),
            outline: true,
            outlineColor: outline,
            outlineWidth: Number.isFinite(outlineWidth) ? outlineWidth : 3,
            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
            perPositionHeight: false
          },
          label: nombre ? {
            text: nombre,
            font: '12px sans-serif',
            fillColor: Cesium.Color.WHITE,
            outlineColor: Cesium.Color.BLACK,
            outlineWidth: 3,
            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
            pixelOffset: new Cesium.Cartesian2(0, -18),
            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND
          } : undefined
        });

        areaEntities.set(entityId, entity);
      } catch (e) {
        console.error('Error addAreaPolygonToMap: ' + e.message);
      }
    };

    window.loadAreaPolygons = function (polygonsArray) {
      try {
        if (!Array.isArray(polygonsArray)) return;
        polygonsArray.forEach(function (polygon) {
          addAreaPolygonToMap(
            polygon.id_area,
            polygon.nombre || 'Polígono / Zona',
            polygon.points || [],
            polygon.color || '#FFD700',
            Number(polygon.opacity ?? 0.35),
            Number(polygon.outline_width ?? 3)
          );
        });
      } catch (e) {
        console.error('Error loadAreaPolygons: ' + e.message);
      }
    };

    window.removeAreaFromMap = function (id) {
      removeCoverageCircleFromMap(id);
    };

    // =========================
    // Dibujo libre (lápiz / goma)
    // =========================
    const drawingEntities = new Map(); // localId → entity

    let _drawMode   = null;   // 'pencil' | 'eraser' | null
    let _isDrawing  = false;
    let _drawCoords = [];
    let _previewEnt = null;
    let _drawHandler = null;
    let _drawCounter = 0;

    function _destroyDrawHandler() {
      if (_drawHandler) { _drawHandler.destroy(); _drawHandler = null; }
    }

    window.startPencilMode = function () {
      _drawMode = 'pencil';
      _destroyDrawHandler();
      _drawHandler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

      _drawHandler.setInputAction(function (e) {
        _isDrawing = true;
        _drawCoords = [];
        viewer.scene.screenSpaceCameraController.enableRotate    = false;
        viewer.scene.screenSpaceCameraController.enableTranslate = false;
        viewer.scene.screenSpaceCameraController.enableZoom      = false;
        var cart = viewer.camera.pickEllipsoid(e.position, viewer.scene.globe.ellipsoid);
        if (cart) {
          var c = Cesium.Cartographic.fromCartesian(cart);
          _drawCoords.push({ lat: Cesium.Math.toDegrees(c.latitude), lng: Cesium.Math.toDegrees(c.longitude) });
        }
      }, Cesium.ScreenSpaceEventType.LEFT_DOWN);

      _drawHandler.setInputAction(function (e) {
        if (!_isDrawing) return;
        var cart = viewer.camera.pickEllipsoid(e.endPosition, viewer.scene.globe.ellipsoid);
        if (!cart) return;
        var c = Cesium.Cartographic.fromCartesian(cart);
        _drawCoords.push({ lat: Cesium.Math.toDegrees(c.latitude), lng: Cesium.Math.toDegrees(c.longitude) });

        if (_drawCoords.length >= 2) {
          if (_previewEnt) viewer.entities.remove(_previewEnt);
          _previewEnt = viewer.entities.add({
            polyline: {
              positions: _drawCoords.map(function (p) { return Cesium.Cartesian3.fromDegrees(p.lng, p.lat); }),
              width: 4,
              material: Cesium.Color.fromCssColorString('#00ffa6'),
              clampToGround: true
            }
          });
        }
      }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

      _drawHandler.setInputAction(function () {
        if (!_isDrawing) return;
        _isDrawing = false;
        viewer.scene.screenSpaceCameraController.enableRotate    = true;
        viewer.scene.screenSpaceCameraController.enableTranslate = true;
        viewer.scene.screenSpaceCameraController.enableZoom      = true;

        if (_previewEnt) { viewer.entities.remove(_previewEnt); _previewEnt = null; }

        if (_drawCoords.length >= 2) {
          var localId = 'draw_' + (++_drawCounter) + '_' + Date.now();
          var color   = '#00ffa6';
          var grosor  = 4;

          var ent = viewer.entities.add({
            id: localId,
            polyline: {
              positions: _drawCoords.map(function (p) { return Cesium.Cartesian3.fromDegrees(p.lng, p.lat); }),
              width: grosor,
              material: Cesium.Color.fromCssColorString(color),
              clampToGround: true
            },
            properties: { tacticalType: 'freehand-drawing' }
          });

          drawingEntities.set(localId, ent);

          if (typeof Android !== 'undefined' && typeof Android.onDrawingSaved === 'function') {
            Android.onDrawingSaved(JSON.stringify({ localId: localId, coords: _drawCoords, color: color, grosor: grosor }));
          }
        }
        _drawCoords = [];
      }, Cesium.ScreenSpaceEventType.LEFT_UP);
    };

    window.stopPencilMode = function () {
      _destroyDrawHandler();
      _isDrawing = false;
      _drawCoords = [];
      if (_previewEnt) { viewer.entities.remove(_previewEnt); _previewEnt = null; }
      viewer.scene.screenSpaceCameraController.enableRotate    = true;
      viewer.scene.screenSpaceCameraController.enableTranslate = true;
      viewer.scene.screenSpaceCameraController.enableZoom      = true;
      if (_drawMode === 'pencil') _drawMode = null;
    };

    window.startEraserMode = function () {
      _drawMode = 'eraser';
      _destroyDrawHandler();
      _drawHandler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

      _drawHandler.setInputAction(function (e) {
        var picked = viewer.scene.pick(e.position);
        if (!picked || !picked.id) return;
        var entity = picked.id;
        var tt = entity.properties && entity.properties.tacticalType
          ? (entity.properties.tacticalType.getValue ? entity.properties.tacticalType.getValue() : entity.properties.tacticalType)
          : '';
        if (tt !== 'freehand-drawing') return;

        var localId = entity.id;
        viewer.entities.remove(entity);
        drawingEntities.delete(localId);

        if (typeof Android !== 'undefined' && typeof Android.onDrawingDeleted === 'function') {
          Android.onDrawingDeleted(localId);
        }
      }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
    };

    window.stopEraserMode = function () {
      _destroyDrawHandler();
      if (_drawMode === 'eraser') _drawMode = null;
    };

    window.loadDrawings = function (drawingsArray) {
      try {
        if (!Array.isArray(drawingsArray)) return;
        drawingsArray.forEach(function (d) {
          if (!Array.isArray(d.coords) || d.coords.length < 2) return;
          var localId = 'draw_loaded_' + d.id_dibujo;
          if (drawingEntities.has(localId)) return;

          var ent = viewer.entities.add({
            id: localId,
            polyline: {
              positions: d.coords.map(function (p) { return Cesium.Cartesian3.fromDegrees(p.lng, p.lat); }),
              width: d.grosor || 4,
              material: Cesium.Color.fromCssColorString(d.color || '#00ffa6'),
              clampToGround: true
            },
            properties: { tacticalType: 'freehand-drawing' }
          });
          drawingEntities.set(localId, ent);
        });
      } catch (e) {
        console.error('Error loadDrawings: ' + e.message);
      }
    };

    window.removeDrawingFromMap = function (idDibujo) {
      try {
        var localId = 'draw_loaded_' + idDibujo;
        var ent = drawingEntities.get(localId);
        if (ent) {
          viewer.entities.remove(ent);
          drawingEntities.delete(localId);
        }
      } catch (e) {
        console.error('Error removeDrawingFromMap: ' + e.message);
      }
    };
  </script>
</body>

</html>
