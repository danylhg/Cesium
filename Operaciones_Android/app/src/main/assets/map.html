<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <script src="milsymbol.min.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body,
    #cesiumContainer {
      width: 100%;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
    }

    .cesium-widget-credits {
      display: none !important;
    }

    #cesiumContainer canvas {
      touch-action: none;
    }

  </style>
</head>

<body>
  <div id="cesiumContainer"></div>

  <script>
    let viewer = null;
    let userMarker = null;

    // Escala íconos/etiquetas con la distancia de la cámara:
    // cerca (1 km) → ×1.5 ; lejos (2 000 km) → ×0.1
    const SCALE_BY_DIST = new Cesium.NearFarScalar(1e3, 1.0, 2e6, 0.04);

    // =========================
    // Estado de rutas
    // =========================
    let pickMode = null; // "start" | "end" | null
    let startPoint = null;
    let endPoint = null;
    let lastRoute = null;

    let startEntity = null;
    let endEntity = null;
    let routeEntity = null;

    let remoteRoutes = new Map();
    let tacticalRoutes = new Map();
    const trackingPersonalEntities = new Map();
    const trackingVehiculoEntities = new Map();
    const emergencyPulseEntities = new Map();
    let selectedTrackingPersonalId = null;
    let followedTrackingPersonalId = null;
    let followMyLocation = false;
    const MIN_CAMERA_ZOOM_DISTANCE = 50;
    const FOLLOW_LOCATION_ZOOM = 250;
    const FOLLOW_TRACKING_ZOOM = 500;
    const TRACKING_PERSONAL_COLOR = Cesium.Color.fromCssColorString("#00BFFF");
    const TRACKING_PERSONAL_SELECTED_COLOR = Cesium.Color.fromCssColorString("#2563EB");
    const TRACKING_ACTIVE_COLOR = Cesium.Color.LIME;
    const TRACKING_SYMBOL_SIZE = 42;
    const TRACKING_PERSONAL_SIDC = "SFGPUCI--------";
    const TRACKING_VEHICULO_SIDC = "SFGPUCD--------";
    const TRACKING_SYMBOL_SCALE_BY_DIST = new Cesium.NearFarScalar(1e3, 1.0, 2e6, 0.22);
    const ROUTE_COLORS = [
      Cesium.Color.MAGENTA,
      Cesium.Color.ORANGE,
      Cesium.Color.LIMEGREEN,
      Cesium.Color.PINK,
      Cesium.Color.DEEPSKYBLUE,
      Cesium.Color.HOTPINK,
      Cesium.Color.GOLD,
      Cesium.Color.VIOLET,
      Cesium.Color.SPRINGGREEN
    ];
    const EMERGENCY_PULSE_COLORS = [
      Cesium.Color.fromCssColorString("#FF1D25"),
      Cesium.Color.fromCssColorString("#FFD400"),
      Cesium.Color.fromCssColorString("#00E5FF")
    ];

    const OSRM_BASE = "https://router.project-osrm.org";
    const CAMERA_STATE_TTL_MS = 24 * 60 * 60 * 1000;
    let cameraStateKey = "sedam_map_camera_default";
    let cameraStateSaveTimer = null;
    let firstOperationViewHandled = false;
    let restoredCameraAt = 0;

    function cameraKeyPart(value, digits) {
      const number = Number(value);
      return Number.isFinite(number) ? number.toFixed(digits) : "x";
    }

    function getOperationCameraScope() {
      try {
        if (window.Android && typeof Android.getOperationId === "function") {
          const id = Number(Android.getOperationId());
          if (Number.isFinite(id) && id > 0) return "op_" + id;
        }
      } catch (_) {
        return null;
      }
      return null;
    }

    function buildCameraStateKey(lat, lon, zoomMeters) {
      const operationScope = getOperationCameraScope();
      if (operationScope) return "sedam_map_camera_" + operationScope;

      return [
        "sedam_map_camera",
        cameraKeyPart(lat, 6),
        cameraKeyPart(lon, 6),
        cameraKeyPart(zoomMeters || 0, 0)
      ].join("_");
    }

    function setCameraStateKey(lat, lon, zoomMeters) {
      cameraStateKey = buildCameraStateKey(lat, lon, zoomMeters);
    }

    function captureCameraState() {
      if (!viewer || !viewer.camera) return null;
      const cartographic = Cesium.Cartographic.fromCartesian(viewer.camera.positionWC || viewer.camera.position);
      if (!cartographic) return null;

      return {
        lat: Cesium.Math.toDegrees(cartographic.latitude),
        lon: Cesium.Math.toDegrees(cartographic.longitude),
        height: cartographic.height,
        heading: viewer.camera.heading,
        pitch: viewer.camera.pitch,
        roll: viewer.camera.roll,
        savedAt: Date.now()
      };
    }

    function saveCameraStateNow() {
      try {
        const state = captureCameraState();
        if (!state) return;
        localStorage.setItem(cameraStateKey, JSON.stringify(state));
      } catch (e) {
        console.warn("No se pudo guardar la camara: " + e.message);
      }
    }

    function scheduleCameraStateSave() {
      window.clearTimeout(cameraStateSaveTimer);
      cameraStateSaveTimer = window.setTimeout(saveCameraStateNow, 250);
    }

    function restoreCameraState() {
      try {
        const raw = localStorage.getItem(cameraStateKey);
        if (!raw) return false;

        const state = JSON.parse(raw);
        if (!state || Date.now() - Number(state.savedAt || 0) > CAMERA_STATE_TTL_MS) {
          localStorage.removeItem(cameraStateKey);
          return false;
        }

        const lat = Number(state.lat);
        const lon = Number(state.lon);
        const height = Number(state.height);
        if (!Number.isFinite(lat) || !Number.isFinite(lon) || !Number.isFinite(height)) return false;

        viewer.camera.setView({
          destination: Cesium.Cartesian3.fromDegrees(lon, lat, height),
          orientation: {
            heading: Number.isFinite(Number(state.heading)) ? Number(state.heading) : 0,
            pitch: Number.isFinite(Number(state.pitch)) ? Number(state.pitch) : -Cesium.Math.PI_OVER_TWO,
            roll: Number.isFinite(Number(state.roll)) ? Number(state.roll) : 0
          }
        });

        restoredCameraAt = Date.now();
        resizeCesium();
        return true;
      } catch (e) {
        console.warn("No se pudo restaurar la camara: " + e.message);
        return false;
      }
    }

    function resizeCesium() {
      try {
        if (!viewer) return;
        viewer.resize();
        if (viewer.scene && typeof viewer.scene.requestRender === "function") {
          viewer.scene.requestRender();
        }
      } catch (e) {
        console.warn("No se pudo redimensionar Cesium: " + e.message);
      }
    }

    window.resizeCesium = resizeCesium;

    function notifyAndroid(message) {
      try {
        if (window.Android && typeof Android.sendTrafficAlert === "function") {
          Android.sendTrafficAlert(String(message));
        }
      } catch (e) {
        console.error("Error notificando a Android: " + e.message);
      }
    }

    function configureGoogleLikeCamera(viewerInstance) {
      const controller = viewerInstance
        && viewerInstance.scene
        && viewerInstance.scene.screenSpaceCameraController;
      if (!controller) return;

      controller.minimumZoomDistance = MIN_CAMERA_ZOOM_DISTANCE;
      controller.maximumZoomDistance = 5000000;
      controller.inertiaSpin = 0.35;
      controller.inertiaTranslate = 0.35;
      controller.inertiaZoom = 0.25;
      controller.maximumMovementRatio = 0.08;

      if ('zoomFactor' in controller) {
        controller.zoomFactor = 2.2;
      }

      controller.enableRotate = true;
      controller.enableTranslate = true;
      controller.enableZoom = true;
      controller.enableTilt = true;
      controller.enableLook = false;
    }

    function disableFollowMyLocation() {
      followMyLocation = false;
    }

    function flyToLocation(lat, lon, zoomMeters, duration) {
      if (!viewer) return;
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(lon, lat, zoomMeters || FOLLOW_LOCATION_ZOOM),
        duration: duration === undefined ? 0.55 : duration
      });
    }

    const baseLayerProviders = {
      osm: function () {
        return new Cesium.OpenStreetMapImageryProvider({
          url: "https://a.tile.openstreetmap.org/"
        });
      },
      satellite: function () {
        return new Cesium.UrlTemplateImageryProvider({
          url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
          credit: "Esri World Imagery"
        });
      }
    };

    function tuneSatelliteLayer(layer) {
      layer.brightness = 0.78;
      layer.contrast = 1.35;
      layer.saturation = 1.15;
      layer.gamma = 0.9;
    }

    window.setBaseLayer = function (key) {
      try {
        if (!viewer) return;
        viewer.imageryLayers.removeAll();

        if (key === "hybrid") {
          const satelliteLayer = viewer.imageryLayers.addImageryProvider(baseLayerProviders.satellite());
          tuneSatelliteLayer(satelliteLayer);

          const osmOverlay = viewer.imageryLayers.addImageryProvider(baseLayerProviders.osm());
          osmOverlay.alpha = 0.28;
          osmOverlay.brightness = 0.95;
          osmOverlay.contrast = 1.2;
          viewer.scene.requestRender();
          return;
        }

        const provider = baseLayerProviders[key] || baseLayerProviders.satellite;
        const layer = viewer.imageryLayers.addImageryProvider(provider());
        if (key === "satellite" || !baseLayerProviders[key]) {
          tuneSatelliteLayer(layer);
        }
        viewer.scene.requestRender();
      } catch (e) {
        console.error("Error cambiando capa base: " + e.message);
        notifyAndroid("No se pudo cambiar el tipo de mapa.");
      }
    };

    function notifyMapTap(lat, lon) {
      try {
        if (window.Android && typeof Android.onMapTapped === "function") {
          Android.onMapTapped(lat, lon);
        }
      } catch (e) {
        console.error("Error notificando tap a Android: " + e.message);
      }
    }

    function notifyMapObjectSelected(payload) {
      try {
        if (window.Android && typeof Android.onMapObjectSelected === "function") {
          Android.onMapObjectSelected(JSON.stringify(payload));
        }
      } catch (e) {
        console.error("Error notificando objeto seleccionado: " + e.message);
      }
    }

    function notifyMapSelectionCleared() {
      try {
        if (window.Android && typeof Android.onMapSelectionCleared === "function") {
          Android.onMapSelectionCleared();
        }
      } catch (e) {
        console.error("Error limpiando seleccion: " + e.message);
      }
    }

    function getEntityText(entity) {
      try {
        if (!entity) return "";
        if (entity.label && entity.label.text) {
          return String(entity.label.text.getValue ? entity.label.text.getValue() : entity.label.text);
        }
        return entity.name ? String(entity.name) : "";
      } catch (_) {
        return "";
      }
    }

    function getEntityProperty(entity, key) {
      try {
        if (!entity || !entity.properties || !entity.properties[key]) return "";
        const prop = entity.properties[key];
        return prop.getValue ? prop.getValue() : prop;
      } catch (_) {
        return "";
      }
    }

    function getSelectableObjectAt(position) {
      if (!viewer) return null;
      const picked = viewer.scene.pick(position);
      if (!picked || !picked.id) return null;

      const entity = picked.id;
      const entityId = String(entity.id || "");
      const label = getEntityText(entity);

      if (entityId.indexOf("poi_") === 0) {
        return { kind: "poi", id: Number(entityId.replace("poi_", "")), label: label || "Punto de Interes" };
      }
      if (entityId.indexOf("area_") === 0) {
        return { kind: "area", id: Number(entityId.replace("area_", "")), label: label || "Area de Interes" };
      }
      if (entityId.indexOf("estructura_") === 0) {
        return { kind: "structure", id: Number(entityId.replace("estructura_", "")), label: label || "Estructura" };
      }
      if (entityId.indexOf("remote_route_") === 0) {
        return { kind: "route", id: Number(entityId.replace("remote_route_", "")), label: label || "Ruta" };
      }
      if (entityId.indexOf("ruta_operacion_") === 0) {
        return { kind: "tactical_route", id: Number(entityId.replace("ruta_operacion_", "")), label: label || "Linea tactica" };
      }

      const trackingKind = String(getEntityProperty(entity, "trackingKind") || "");
      if (trackingKind === "personal") {
        const trackingId = Number(getEntityProperty(entity, "trackingId"));
        if (Number.isFinite(trackingId) && trackingId > 0) {
          return { kind: "personal", id: trackingId, label: label || ("P-" + trackingId) };
        }
      }

      const tacticalType = String(getEntityProperty(entity, "tacticalType") || "");
      if (tacticalType === "freehand-drawing") {
        const match = entityId.match(/^draw_loaded_(\d+)$/);
        return {
          kind: "drawing",
          id: match ? Number(match[1]) : null,
          localId: entityId,
          label: "Dibujo libre"
        };
      }

      return null;
    }

    function notifyRouteCreated(route) {
      try {
        if (!route || !route.geometry || !Array.isArray(route.geometry.coordinates)) {
          console.error("Ruta inválida para enviar a Android");
          return;
        }

        if (!startPoint || !endPoint) {
          console.error("No hay origen/destino para enviar ruta a Android");
          return;
        }

        const payload = {
          geojson: route.geometry,
          origen_lat: startPoint.lat,
          origen_lon: startPoint.lon,
          destino_lat: endPoint.lat,
          destino_lon: endPoint.lon,
          distancia_m: Number(route.distance) || 0,
          duracion_s: Number(route.duration) || 0
        };

        console.log("Enviando ruta a Android:", payload);

        if (window.Android && typeof Android.onRouteCreated === "function") {
          Android.onRouteCreated(JSON.stringify(payload));
        } else {
          console.warn("Android.onRouteCreated no está disponible");
        }
      } catch (e) {
        console.error("Error notificando ruta a Android: " + e.message);
      }
    }

    try {
      viewer = new Cesium.Viewer('cesiumContainer', {
        baseLayer: new Cesium.ImageryLayer(
          new Cesium.UrlTemplateImageryProvider({
            url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
            subdomains: 'abcd',
            credit: '© OpenStreetMap contributors, © CARTO'
          })
        ),
        terrainProvider: new Cesium.EllipsoidTerrainProvider(),
        timeline: false,
        animation: false,
        baseLayerPicker: false,
        geocoder: false,
        homeButton: false,
        sceneModePicker: false,
        navigationHelpButton: false,
        fullscreenButton: false,
        infoBox: false,
        selectionIndicator: false
      });

      // Vista limpia más tipo 2D táctico
      viewer.scene.skyBox.show = false;
      viewer.scene.skyAtmosphere.show = false;
      viewer.scene.sun.show = false;
      viewer.scene.moon.show = false;
      configureGoogleLikeCamera(viewer);
      if (viewer.camera && viewer.camera.changed) {
        viewer.camera.changed.addEventListener(scheduleCameraStateSave);
      }
      if (viewer.camera && viewer.camera.moveEnd) {
        viewer.camera.moveEnd.addEventListener(saveCameraStateNow);
      }
      window.addEventListener("pagehide", saveCameraStateNow);
      window.addEventListener("beforeunload", saveCameraStateNow);
      window.addEventListener("resize", () => window.setTimeout(resizeCesium, 120));
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) saveCameraStateNow();
      });

      const followCancelHandler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
      [
        Cesium.ScreenSpaceEventType.LEFT_DOWN,
        Cesium.ScreenSpaceEventType.MIDDLE_DOWN,
        Cesium.ScreenSpaceEventType.RIGHT_DOWN,
        Cesium.ScreenSpaceEventType.WHEEL,
        Cesium.ScreenSpaceEventType.PINCH_START
      ].forEach((eventType) => {
        if (eventType !== undefined) {
          followCancelHandler.setInputAction(disableFollowMyLocation, eventType);
        }
      });

      let lastHandledTap = null;

      function getMapCartesian(screenPosition) {
        let cartesian = null;
        if (viewer.scene.pickPositionSupported) {
          cartesian = viewer.scene.pickPosition(screenPosition);
        }
        return cartesian || viewer.camera.pickEllipsoid(
          screenPosition,
          viewer.scene.globe.ellipsoid
        );
      }

      function handleMapTap(screenPosition) {
        try {
          if (!viewer || !screenPosition) return;

          const now = Date.now();
          if (
            lastHandledTap &&
            now - lastHandledTap.at < 320 &&
            Math.abs(lastHandledTap.x - screenPosition.x) < 12 &&
            Math.abs(lastHandledTap.y - screenPosition.y) < 12
          ) {
            return;
          }
          lastHandledTap = { at: now, x: screenPosition.x, y: screenPosition.y };

          const cartesian = getMapCartesian(screenPosition);

          if (!cartesian) return;

          const cartographic = Cesium.Cartographic.fromCartesian(cartesian);
          const lat = Cesium.Math.toDegrees(cartographic.latitude);
          const lon = Cesium.Math.toDegrees(cartographic.longitude);

          if (pickMode === "start") {
            setStartPoint(lat, lon);
            pickMode = null;
            notifyAndroid("Origen seleccionado");
            return;
          }

          if (pickMode === "end") {
            setEndPoint(lat, lon);
            pickMode = null;
            notifyAndroid("Destino seleccionado");
            return;
          }

          if (_drawMode) {
            return;
          }

          if (!_drawMode) {
            const selectedObject = getSelectableObjectAt(screenPosition);
            if (selectedObject) {
              if (selectedObject.kind === "personal") {
                setSelectedTrackingPersonal(selectedObject.id);
              } else {
                setSelectedTrackingPersonal(null);
              }
              notifyMapObjectSelected(selectedObject);
              return;
            }
          }

          setSelectedTrackingPersonal(null);
          notifyMapSelectionCleared();

          // Click normal, se mantiene tu flujo actual
          notifyMapTap(lat, lon);
        } catch (e) {
          console.error("Error en click del mapa: " + e.message);
          notifyAndroid("Error en el click del mapa: " + e.message);
        }
      }

      window.tapMapAtViewportRatio = function (xRatio, yRatio) {
        const canvas = viewer && viewer.scene && viewer.scene.canvas;
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        handleMapTap(new Cesium.Cartesian2(
          rect.width * Number(xRatio),
          rect.height * Number(yRatio)
        ));
      };

      // Cesium normalmente traduce el tap a LEFT_CLICK. El respaldo touch
      // mantiene la colocacion activa dentro del WebView Android.
      const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
      handler.setInputAction((movement) => {
        handleMapTap(movement.position);
      }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

      let touchStart = null;
      viewer.scene.canvas.addEventListener("touchstart", function (event) {
        if (!event.touches || event.touches.length !== 1) {
          touchStart = null;
          return;
        }
        const touch = event.touches[0];
        touchStart = { x: touch.clientX, y: touch.clientY };
      }, { passive: true });
      viewer.scene.canvas.addEventListener("touchend", function (event) {
        if (!touchStart || !event.changedTouches || event.changedTouches.length !== 1) {
          touchStart = null;
          return;
        }
        const touch = event.changedTouches[0];
        const dx = touch.clientX - touchStart.x;
        const dy = touch.clientY - touchStart.y;
        touchStart = null;
        if (Math.sqrt(dx * dx + dy * dy) > 12) return;

        const rect = viewer.scene.canvas.getBoundingClientRect();
        handleMapTap(new Cesium.Cartesian2(
          touch.clientX - rect.left,
          touch.clientY - rect.top
        ));
      }, { passive: true });

      setBaseLayer("hybrid");

      if (window.Android && typeof Android.sendTrafficAlert === 'function') {
        Android.sendTrafficAlert("Mapa listo");
      }

      console.log("Cesium OK");
    } catch (e) {
      console.error("Error iniciando Cesium: " + e.message);
      document.body.innerHTML =
        '<div style="color:#ef4444;padding:20px;font-family:monospace;background:#0a0f1e">Error: ' + e.message + '</div>';
    }

    // =========================
    // Funciones actuales
    // =========================
    window.setOperationView = function (lat, lon, zoomMeters) {
      try {
        if (!viewer) return;
        setCameraStateKey(lat, lon, zoomMeters);

        if (!firstOperationViewHandled) {
          firstOperationViewHandled = true;
          if (restoreCameraState()) return;
        }

        if (restoredCameraAt && Date.now() - restoredCameraAt < 7000) {
          return;
        }

        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(lon, lat, zoomMeters || 15000),
          duration: 2.5
        });
      } catch (e) {
        console.error("Error en setOperationView: " + e.message);
      }
    };

    window.centerOnLocation = function (lat, lon, zoomMeters, followMode) {
      try {
        if (!viewer) return;
        followMyLocation = followMode === true;
        if (followMyLocation) followedTrackingPersonalId = null;
        flyToLocation(lat, lon, zoomMeters || FOLLOW_LOCATION_ZOOM, 0.8);
      } catch (e) {
        console.error("Error en centerOnLocation: " + e.message);
      }
    };

    window.updateMyPosition = function (lat, lon) {
      try {
        if (!viewer) return;
        if (userMarker) viewer.entities.remove(userMarker);
        const userSymbolCanvas = getMilSymbolCanvas(TRACKING_PERSONAL_SIDC);

        userMarker = viewer.entities.add({
          position: Cesium.Cartesian3.fromDegrees(lon, lat),
          billboard: userSymbolCanvas ? {
            image: userSymbolCanvas,
            verticalOrigin: Cesium.VerticalOrigin.CENTER,
            width: TRACKING_SYMBOL_SIZE,
            height: TRACKING_SYMBOL_SIZE,
            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
            disableDepthTestDistance: Number.POSITIVE_INFINITY,
            scaleByDistance: TRACKING_SYMBOL_SCALE_BY_DIST
          } : undefined,
          point: userSymbolCanvas ? undefined : {
            pixelSize: 10,
            color: Cesium.Color.LIME.withAlpha(0.15),
            outlineColor: Cesium.Color.BLACK,
            outlineWidth: 3,
            disableDepthTestDistance: Number.POSITIVE_INFINITY,
            scaleByDistance: new Cesium.NearFarScalar(1e3, 1.0, 2e6, 0.8)
          }
        });

        if (followMyLocation) {
          flyToLocation(lat, lon, FOLLOW_LOCATION_ZOOM, 0.45);
        }
      } catch (e) {
        console.error("Error en updateMyPosition: " + e.message);
      }
    };

    function applyPersonalTrackingStyle(entity, selected) {
      if (!entity || !entity.point) return;

      const markerColor = selected ? TRACKING_PERSONAL_SELECTED_COLOR : TRACKING_PERSONAL_COLOR;
      entity.point.pixelSize = selected ? 16 : 12;
      entity.point.color = markerColor.withAlpha(selected ? 0.9 : 0.35);
      entity.point.outlineColor = TRACKING_ACTIVE_COLOR;
      entity.point.outlineWidth = selected ? 6 : 4;

      if (entity.label) {
        entity.label.showBackground = true;
        entity.label.fillColor = Cesium.Color.WHITE;
        entity.label.backgroundColor = markerColor.withAlpha(selected ? 0.9 : 0.68);
        entity.label.backgroundPadding = new Cesium.Cartesian2(5, 3);
      }
    }

    function setSelectedTrackingPersonal(id) {
      const nextId = id == null ? null : String(id);

      if (selectedTrackingPersonalId && selectedTrackingPersonalId !== nextId) {
        const previous = trackingPersonalEntities.get(selectedTrackingPersonalId);
        applyPersonalTrackingStyle(previous, false);
      }

      selectedTrackingPersonalId = nextId;

      if (selectedTrackingPersonalId) {
        const current = trackingPersonalEntities.get(selectedTrackingPersonalId);
        applyPersonalTrackingStyle(current, true);
      }
    }

    window.selectTrackingPersonal = function (idPersonal) {
      setSelectedTrackingPersonal(idPersonal);
    };

    window.followTrackingPersonal = function (idPersonal, lat, lon, zoomMeters) {
      if (!viewer) return;
      const id = String(idPersonal || "");
      followedTrackingPersonalId = id || null;
      followMyLocation = false;
      setSelectedTrackingPersonal(id || null);

      const live = id ? trackingPersonalEntities.get(id) : null;
      let destLat = Number(lat);
      let destLon = Number(lon);
      const livePosition = live && (live.position && live.position.getValue
        ? live.position.getValue(viewer.clock.currentTime)
        : live.position);

      if (livePosition) {
        const carto = Cesium.Cartographic.fromCartesian(livePosition);
        destLat = Cesium.Math.toDegrees(carto.latitude);

      if (!viewer || !id || !position) return;

      removeEmergencyPulse(id);

      const startedAt = Date.now();
      const durationMs = 4200;
      const pulseEntities = EMERGENCY_PULSE_COLORS.map(function (color, index) {
        const delayMs = index * 430;
        const entity = viewer.entities.add({
          name: "Emergencia personal " + id,
          position: position,
          ellipse: {
            semiMajorAxis: new Cesium.CallbackProperty(function () {
              const progress = Math.max(0, Math.min(1, (Date.now() - startedAt - delayMs) / durationMs));
              return 35 + progress * 360;
            }, false),
            semiMinorAxis: new Cesium.CallbackProperty(function () {
              const progress = Math.max(0, Math.min(1, (Date.now() - startedAt - delayMs) / durationMs));
              return 35 + progress * 360;
            }, false),
            material: new Cesium.ColorMaterialProperty(
              new Cesium.CallbackProperty(function () {
                const progress = Math.max(0, Math.min(1, (Date.now() - startedAt - delayMs) / durationMs));
                const alpha = progress <= 0 ? 0 : Math.max(0, 0.68 * (1 - progress));
                return color.withAlpha(alpha);
              }, false)
            ),
            outline: true,
            outlineColor: color.withAlpha(0.95),
            outlineWidth: 4,
            height: 0
          }
        });
        return entity;
      });

      emergencyPulseEntities.set(id, pulseEntities);
      window.setTimeout(function () {
        removeEmergencyPulse(id);
      }, durationMs + (EMERGENCY_PULSE_COLORS.length * 430) + 300);

    // =========================

    async function getOsrmRoute(start, end) {
      const url =
        `${OSRM_BASE}/route/v1/driving/` +
        `${start.lon},${start.lat};${end.lon},${end.lat}` +
        `?overview=full&geometries=geojson`;

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 900000);

      try {
        const response = await fetch(url, {
          signal: controller.signal
        });

        if (!response.ok) {
          throw new Error("No se pudo obtener ruta");
        }

        const data = await response.json();

        if (!data.routes || !data.routes.length) {
          throw new Error("No hay ruta disponible");
        }

        return data.routes[0];
      } catch (err) {
        if (err.name === "AbortError") {
          throw new Error("La consulta de ruta tardó demasiado");
        }
        throw err;
      } finally {
        clearTimeout(timeoutId);
      }
    }

    function drawRouteOnCesium(geojsonLineString) {
      if (!viewer || !geojsonLineString || !Array.isArray(geojsonLineString.coordinates)) {
        return;
      }

      const positions = geojsonLineString.coordinates.map(([lon, lat]) =>
        Cesium.Cartesian3.fromDegrees(lon, lat)
      );

      if (routeEntity) {
        viewer.entities.remove(routeEntity);
      }

      routeEntity = viewer.entities.add({
        polyline: {
          positions,
          width: 5,
          material: Cesium.Color.CYAN.withAlpha(0.9),
          clampToGround: true
        }
      });
    }

    async function calculateRouteSilently() {
      try {
        if (!startPoint || !endPoint) return;

        console.log("1. Entró a calculateRouteSilently", Date.now());
        console.log("startPoint:", startPoint);
        console.log("endPoint:", endPoint);

        const route = await getOsrmRoute(startPoint, endPoint);

        console.log("2. OSRM respondió", Date.now(), route);

        if (!route || !route.geometry || route.geometry.type !== "LineString") {
          throw new Error("La ruta regresó vacía o sin geometry válida");
        }

        lastRoute = route;

        drawRouteOnCesium(route.geometry);
        notifyRouteCreated(route);

        console.log("3. Ruta dibujada y enviada al backend", Date.now());
      } catch (e) {
        console.error("Error calculando ruta:", e);
      }
    }

        const route = await getOsrmRoute(startPoint, endPoint);
        lastRoute = route;

        drawRouteOnCesium(route.geometry);


        const km = route.distance / 1000;
        const min = route.duration / 60;

        notifyAndroid(
          `Ruta lista. Distancia: ${km.toFixed(2)} km · Tiempo: ${min.toFixed(1)} min`
        );
      } catch (e) {

    window.drawRemoteRoute = function (rutaObj) {
      if (!rutaObj || !rutaObj.geojson) return;

      const geojson = typeof rutaObj.geojson === 'string' ? JSON.parse(rutaObj.geojson) : rutaObj.geojson;
      const id = rutaObj.id_ruta;
      if (!id) return;

      if (remoteRoutes.has(id)) {
        viewer.entities.remove(remoteRoutes.get(id));
        remoteRoutes.delete(id);
      }

      const routeColor = routeColorFromPayload(rutaObj);

      let coords = [];
      if (geojson.coordinates && geojson.coordinates.length > 0) {
        coords = geojson.coordinates.map(c => Cesium.Cartesian3.fromDegrees(c[0], c[1]));
      }

      if (coords.length > 0) {
        const lineEntity = viewer.entities.add({
          id: "remote_route_" + id,
          polyline: {
            positions: coords,
            width: 5,
            material: new Cesium.PolylineGlowMaterialProperty({
              glowPower: 0.1,
              color: routeColor
            }),
            clampToGround: true
          }
        });
        remoteRoutes.set(id, lineEntity);
      }
    };

    function getStableRouteColor(id) {
      if (!id || id === "global") return Cesium.Color.CYAN;

      let hash = 0;
      const value = String(id);
      for (let i = 0; i < value.length; i++) {
        hash = value.charCodeAt(i) + ((hash << 5) - hash);
      }
      return ROUTE_COLORS[Math.abs(hash) % ROUTE_COLORS.length];
    }

    function routeColorFromPayload(rutaObj) {
      const color = rutaObj && rutaObj.color ? String(rutaObj.color) : "";
      if (color && color.toUpperCase() !== "#1E90FF") {
        return Cesium.Color.fromCssColorString(color);

      return getStableRouteColor(rutaObj && rutaObj.id_vehiculo);

    function operationGridDefaultName(index) {
      const phonetic = [
        'ALFA', 'BRAVO', 'CHARLIE', 'DELTA', 'ECHO', 'FOXTROT', 'GOLF', 'HOTEL',
        'INDIA', 'JULIETT', 'KILO', 'LIMA', 'MIKE', 'NOVEMBER', 'OSCAR', 'PAPA',
        'QUEBEC', 'ROMEO', 'SIERRA', 'TANGO', 'UNIFORM', 'VICTOR', 'WHISKEY', 'X-RAY',
        'YANKEE', 'ZULU'
      ];
      const baseName = phonetic[index % phonetic.length] || ('Q' + (index + 1));
      const cycle = Math.floor(index / phonetic.length);
      return cycle > 0 ? (baseName + '-' + (cycle + 1)) : baseName;
    }

    function operationGridBounds(points) {
      let minLat = Infinity;
      let maxLat = -Infinity;
      let minLon = Infinity;
      let maxLon = -Infinity;

      points.forEach(function (point) {
        const lat = Number(point.lat);
        const lon = Number(point.lon);
        if (!Number.isFinite(lat) || !Number.isFinite(lon)) return;
        minLat = Math.min(minLat, lat);
        maxLat = Math.max(maxLat, lat);
        minLon = Math.min(minLon, lon);
        maxLon = Math.max(maxLon, lon);
      });

      if (!Number.isFinite(minLat) || !Number.isFinite(maxLat) ||
          !Number.isFinite(minLon) || !Number.isFinite(maxLon)) return null;

      return { minLat, maxLat, minLon, maxLon };
    }

    function renderOperationGrid(gridObj) {
      try {
        if (!viewer || !gridObj) return;
        if (!operationZoneForGrid || !Array.isArray(operationZoneForGrid.points) || operationZoneForGrid.points.length < 3) {
          pendingOperationGrid = gridObj;
          return;
        }

        clearOperationGrid();

        const size = String(gridObj.size || '').toLowerCase();
        const match = size.match(/^(\d+)x(\d+)$/);
        const rows = Number(gridObj.rows || (match && match[1]));
        const cols = Number(gridObj.cols || (match && match[2]));
        if (!Number.isFinite(rows) || !Number.isFinite(cols) || rows <= 0 || cols <= 0) return;

        const bounds = operationGridBounds(operationZoneForGrid.points);
        if (!bounds) return;

        const latStep = (bounds.maxLat - bounds.minLat) / rows;
        const lonStep = (bounds.maxLon - bounds.minLon) / cols;
        if (!Number.isFinite(latStep) || !Number.isFinite(lonStep) || latStep <= 0 || lonStep <= 0) return;

        const colors = [
          '#FFA000', '#1E88E5', '#E53935', '#00897B', '#8E24AA',
          '#FB8C00', '#D81B60', '#039BE5', '#43A047', '#FDD835'
        ].map(function (color) { return Cesium.Color.fromCssColorString(color); });

        let colorIndex = 0;
        for (let col = 1; col < cols; col += 1) {
          const lon = bounds.minLon + col * lonStep;
          const color = colors[colorIndex % colors.length];
          colorIndex += 1;
          operationGridEntities.push(viewer.entities.add({
            polyline: {
              positions: Cesium.Cartesian3.fromDegreesArray([lon, bounds.minLat, lon, bounds.maxLat]),
              width: 3,
              material: new Cesium.PolylineDashMaterialProperty({
                color: color.withAlpha(0.72),
                dashLength: 16
              }),
              clampToGround: true
            }
          }));
        }

        for (let row = 1; row < rows; row += 1) {
          const lat = bounds.minLat + row * latStep;
          const color = colors[colorIndex % colors.length];
          colorIndex += 1;
          operationGridEntities.push(viewer.entities.add({
            polyline: {
              positions: Cesium.Cartesian3.fromDegreesArray([bounds.minLon, lat, bounds.maxLon, lat]),
              width: 3,
              material: new Cesium.PolylineDashMaterialProperty({
                color: color.withAlpha(0.72),
                dashLength: 16
              }),
              clampToGround: true
            }
          }));
        }

        const names = Array.isArray(gridObj.names)
          ? gridObj.names
          : (Array.isArray(gridObj.nombres) ? gridObj.nombres : []);

        let index = 0;
        for (let row = 0; row < rows; row += 1) {
          const latTop = bounds.maxLat - row * latStep;
          const latBottom = bounds.maxLat - (row + 1) * latStep;

          for (let col = 0; col < cols; col += 1) {
            const lonLeft = bounds.minLon + col * lonStep;
            const lonRight = bounds.minLon + (col + 1) * lonStep;
            const color = colors[index % colors.length];
            const label = String(names[index] || '').trim() || operationGridDefaultName(index);

            operationGridEntities.push(viewer.entities.add({
              polygon: {
                hierarchy: Cesium.Cartesian3.fromDegreesArray([
                  lonLeft, latBottom,
                  lonRight, latBottom,
                  lonRight, latTop,
                  lonLeft, latTop
                ]),
                material: color.withAlpha(0.08),
                heightReference: Cesium.HeightReference.CLAMP_TO_GROUND
              }
            }));

            operationGridEntities.push(viewer.entities.add({
              position: Cesium.Cartesian3.fromDegrees(lonLeft, latTop),
              label: {
                text: ' ' + label + ' ',
                font: 'bold 13px monospace',
                fillColor: Cesium.Color.WHITE,
                backgroundColor: Cesium.Color.BLACK.withAlpha(0.72),
                showBackground: true,
                horizontalOrigin: Cesium.HorizontalOrigin.LEFT,
                verticalOrigin: Cesium.VerticalOrigin.TOP,
                heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                pixelOffset: new Cesium.Cartesian2(5, 5),
                disableDepthTestDistance: Number.POSITIVE_INFINITY,
                scaleByDistance: SCALE_BY_DIST
              }
            }));

            index += 1;
          }
        }
      } catch (e) {
        console.error('Error renderOperationGrid: ' + e.message);
      }
    }

    // =========================
    // Dibujo libre (lápiz / goma)
    // =========================
    const drawingEntities = new Map(); // localId → entity

    let _drawMode   = null;   // 'pencil' | 'eraser' | null
    let _isDrawing  = false;
    let _drawCoords = [];
    let _previewEnt = null;
    let _drawHandler = null;
    let _drawCounter = 0;
    let _drawDomHandlers = null;
    let _drawCameraLocked = false;

    function _applyDrawCameraLock(locked) {
      if (!viewer || !viewer.scene || !viewer.scene.screenSpaceCameraController) return;
      const controller = viewer.scene.screenSpaceCameraController;
      controller.enableRotate    = !locked;
      controller.enableTranslate = !locked;
      controller.enableLook      = !locked;
      controller.enableZoom      = true;
      controller.enableTilt      = true;
    }

    function _bindDrawTouchCameraOverride() {
      const canvas = viewer && viewer.scene && viewer.scene.canvas;
      if (!canvas || canvas.dataset.drawTouchOverride === '1') return;
      const activeTouchPointers = new Set();

      const syncTouchCamera = function (event) {
        if (!_drawCameraLocked) return;
        _applyDrawCameraLock(!(event.touches && event.touches.length >= 2));
      };
      const restoreSingleTouchLock = function () {
        if (_drawCameraLocked) _applyDrawCameraLock(true);
      };
      const syncPointerCamera = function (event) {
        if (event.pointerType !== 'touch' || !_drawCameraLocked) return;
        if (event.type === 'pointerdown') activeTouchPointers.add(event.pointerId);
        if (event.type === 'pointerup' || event.type === 'pointercancel') activeTouchPointers.delete(event.pointerId);
        _applyDrawCameraLock(activeTouchPointers.size < 2);
      };

      canvas.addEventListener('touchstart', syncTouchCamera, { passive: true });
      canvas.addEventListener('touchmove', syncTouchCamera, { passive: true });
      canvas.addEventListener('touchend', restoreSingleTouchLock, { passive: true });
      canvas.addEventListener('touchcancel', restoreSingleTouchLock, { passive: true });
      canvas.addEventListener('pointerdown', syncPointerCamera, { passive: true });
      canvas.addEventListener('pointerup', syncPointerCamera, { passive: true });
      canvas.addEventListener('pointercancel', syncPointerCamera, { passive: true });
      canvas.dataset.drawTouchOverride = '1';
    }

    function _destroyDrawHandler() {
      if (_drawHandler) { _drawHandler.destroy(); _drawHandler = null; }
      _unbindPencilDomEvents();
    }

    function _setDrawCameraEnabled(enabled) {
      if (!viewer || !viewer.scene || !viewer.scene.screenSpaceCameraController) return;
      _drawCameraLocked = !enabled;
      _bindDrawTouchCameraOverride();
      _applyDrawCameraLock(!enabled);
    }

    function _canvasPositionFromClient(clientX, clientY) {
      if (!viewer || !viewer.scene || !viewer.scene.canvas) return null;
      const rect = viewer.scene.canvas.getBoundingClientRect();
      return new Cesium.Cartesian2(clientX - rect.left, clientY - rect.top);
    }

    function _coordFromCanvasPosition(position) {
      if (!viewer || !position) return null;
      const cart = viewer.camera.pickEllipsoid(position, viewer.scene.globe.ellipsoid);
      if (!cart) return null;
      const c = Cesium.Cartographic.fromCartesian(cart);
      return {
        lat: Cesium.Math.toDegrees(c.latitude),
        lng: Cesium.Math.toDegrees(c.longitude)
      };
    }

    function _renderPencilPreview() {
      if (!viewer || _drawCoords.length < 2) return;
      if (_previewEnt) viewer.entities.remove(_previewEnt);
      _previewEnt = viewer.entities.add({
        polyline: {
          positions: _drawCoords.map(function (p) { return Cesium.Cartesian3.fromDegrees(p.lng, p.lat); }),
          width: 4,
          material: Cesium.Color.fromCssColorString('#00ffa6'),
          clampToGround: true
        }
      });
    }

    function _appendPencilPoint(position) {
      const point = _coordFromCanvasPosition(position);
      if (!point) return;

      const last = _drawCoords[_drawCoords.length - 1];
      if (last && Math.abs(last.lat - point.lat) < 0.0000001 && Math.abs(last.lng - point.lng) < 0.0000001) {
        return;
      }

      _drawCoords.push(point);
      _renderPencilPreview();
    }

    function _startPencilStroke(position) {
      if (_drawMode !== 'pencil') return;
      _isDrawing = true;
      _drawCoords = [];
      _setDrawCameraEnabled(false);
      _appendPencilPoint(position);
    }

    function _finishPencilStroke() {
      if (!_isDrawing) return;
      _isDrawing = false;
      if (_drawMode !== 'pencil') {
        _setDrawCameraEnabled(true);
      }

      if (_previewEnt) { viewer.entities.remove(_previewEnt); _previewEnt = null; }

      if (_drawCoords.length >= 2) {
        var localId = 'draw_' + (++_drawCounter) + '_' + Date.now();
        var color   = '#00ffa6';
        var grosor  = 4;

        var ent = viewer.entities.add({
          id: localId,
          polyline: {
            positions: _drawCoords.map(function (p) { return Cesium.Cartesian3.fromDegrees(p.lng, p.lat); }),
            width: grosor,
            material: Cesium.Color.fromCssColorString(color),
            clampToGround: true
          },
          properties: { tacticalType: 'freehand-drawing' }
        });

        drawingEntities.set(localId, ent);

        if (typeof Android !== 'undefined' && typeof Android.onDrawingSaved === 'function') {
          Android.onDrawingSaved(JSON.stringify({ localId: localId, coords: _drawCoords, color: color, grosor: grosor }));
        }
      }

      _drawCoords = [];
    }

    function _bindPencilDomEvents() {
      const canvas = viewer && viewer.scene && viewer.scene.canvas;
      if (!canvas) return;
      _unbindPencilDomEvents();

      if (window.PointerEvent) {
        const activeTouchPointers = new Set();

        const onPointerDown = function (ev) {
          if (_drawMode !== 'pencil') return;
          if (ev.button !== undefined && ev.button !== 0) return;
          if (ev.pointerType === 'touch') {
            activeTouchPointers.add(ev.pointerId);
            if (activeTouchPointers.size >= 2) {
              _finishPencilStroke();
              _applyDrawCameraLock(false);
              return;
            }
          }
          ev.preventDefault();
          ev.stopPropagation();
          if (ev.stopImmediatePropagation) ev.stopImmediatePropagation();
          if (canvas.setPointerCapture && ev.pointerId !== undefined) {
            try { canvas.setPointerCapture(ev.pointerId); } catch (_) {}
          }
          _startPencilStroke(_canvasPositionFromClient(ev.clientX, ev.clientY));
        };
        const onPointerMove = function (ev) {
          if (_drawMode !== 'pencil' || !_isDrawing) return;
          if (ev.pointerType === 'touch' && activeTouchPointers.size >= 2) return;
          ev.preventDefault();
          ev.stopPropagation();
          if (ev.stopImmediatePropagation) ev.stopImmediatePropagation();
          _appendPencilPoint(_canvasPositionFromClient(ev.clientX, ev.clientY));
        };
        const onPointerUp = function (ev) {
          if (_drawMode !== 'pencil') return;
          if (ev.pointerType === 'touch') {
            const wasMultiTouch = activeTouchPointers.size >= 2;
            activeTouchPointers.delete(ev.pointerId);
            if (wasMultiTouch) {
              if (activeTouchPointers.size < 2 && _drawCameraLocked) _applyDrawCameraLock(true);
              return;
            }
          }
          ev.preventDefault();
          ev.stopPropagation();
          if (ev.stopImmediatePropagation) ev.stopImmediatePropagation();
          if (canvas.releasePointerCapture && ev.pointerId !== undefined) {
            try { canvas.releasePointerCapture(ev.pointerId); } catch (_) {}
          }
          _finishPencilStroke();
        };

        canvas.addEventListener('pointerdown', onPointerDown, { passive: false, capture: true });
        canvas.addEventListener('pointermove', onPointerMove, { passive: false, capture: true });
        canvas.addEventListener('pointerup', onPointerUp, { passive: false, capture: true });
        canvas.addEventListener('pointercancel', onPointerUp, { passive: false, capture: true });
        _drawDomHandlers = { type: 'pointer', canvas, onPointerDown, onPointerMove, onPointerUp };
        return;
      }

      const firstTouch = function (ev) {
        return (ev.changedTouches && ev.changedTouches[0]) || (ev.touches && ev.touches[0]) || null;
      };
      const onTouchStart = function (ev) {
        if (_drawMode !== 'pencil') return;
        const touch = firstTouch(ev);
        if (!touch) return;
        ev.preventDefault();
        ev.stopPropagation();
        if (ev.stopImmediatePropagation) ev.stopImmediatePropagation();
        _startPencilStroke(_canvasPositionFromClient(touch.clientX, touch.clientY));
      };
      const onTouchMove = function (ev) {
        if (_drawMode !== 'pencil' || !_isDrawing) return;
        const touch = firstTouch(ev);
        if (!touch) return;
        ev.preventDefault();
        ev.stopPropagation();
        if (ev.stopImmediatePropagation) ev.stopImmediatePropagation();
        _appendPencilPoint(_canvasPositionFromClient(touch.clientX, touch.clientY));
      };
      const onTouchEnd = function (ev) {
        if (_drawMode !== 'pencil') return;
        ev.preventDefault();
        ev.stopPropagation();
        if (ev.stopImmediatePropagation) ev.stopImmediatePropagation();
        _finishPencilStroke();
      };

      canvas.addEventListener('touchstart', onTouchStart, { passive: false, capture: true });
      canvas.addEventListener('touchmove', onTouchMove, { passive: false, capture: true });
      canvas.addEventListener('touchend', onTouchEnd, { passive: false, capture: true });
      canvas.addEventListener('touchcancel', onTouchEnd, { passive: false, capture: true });
      _drawDomHandlers = { type: 'touch', canvas, onTouchStart, onTouchMove, onTouchEnd };
    }

    function _unbindPencilDomEvents() {
      if (!_drawDomHandlers) return;
      const h = _drawDomHandlers;
      if (h.type === 'pointer') {
        h.canvas.removeEventListener('pointerdown', h.onPointerDown, true);
        h.canvas.removeEventListener('pointermove', h.onPointerMove, true);
        h.canvas.removeEventListener('pointerup', h.onPointerUp, true);
        h.canvas.removeEventListener('pointercancel', h.onPointerUp, true);
      } else {
        h.canvas.removeEventListener('touchstart', h.onTouchStart, true);
        h.canvas.removeEventListener('touchmove', h.onTouchMove, true);
        h.canvas.removeEventListener('touchend', h.onTouchEnd, true);
        h.canvas.removeEventListener('touchcancel', h.onTouchEnd, true);
      }
      _drawDomHandlers = null;
    }

    window.startPencilMode = function () {
      _drawMode = 'pencil';
      _destroyDrawHandler();
      _setDrawCameraEnabled(false);
      _bindPencilDomEvents();
    };

    window.stopPencilMode = function () {
      _destroyDrawHandler();
      _isDrawing = false;
      _drawCoords = [];
      if (_previewEnt) { viewer.entities.remove(_previewEnt); _previewEnt = null; }
      _setDrawCameraEnabled(true);
      if (_drawMode === 'pencil') _drawMode = null;
    };

    window.startEraserMode = function () {
      _drawMode = 'eraser';
      _destroyDrawHandler();
      _drawHandler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

      _drawHandler.setInputAction(function (e) {
        var picked = viewer.scene.pick(e.position);
        if (!picked || !picked.id) return;
        var entity = picked.id;
        var tt = entity.properties && entity.properties.tacticalType
          ? (entity.properties.tacticalType.getValue ? entity.properties.tacticalType.getValue() : entity.properties.tacticalType)
          : '';
        if (tt !== 'freehand-drawing') return;

        var localId = entity.id;
        viewer.entities.remove(entity);
        drawingEntities.delete(localId);

        if (typeof Android !== 'undefined' && typeof Android.onDrawingDeleted === 'function') {
          Android.onDrawingDeleted(localId);
        }
      }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
    };

    window.stopEraserMode = function () {
      _destroyDrawHandler();
      if (_drawMode === 'eraser') _drawMode = null;
    };

    window.loadDrawings = function (drawingsArray, replace) {
      try {
        if (!Array.isArray(drawingsArray)) return;
        const incomingIds = new Set(
          drawingsArray
            .map(d => Number(d && d.id_dibujo))
            .filter(id => Number.isFinite(id) && id > 0)
            .map(id => 'draw_loaded_' + id)
        );
        if (replace) {
          Array.from(drawingEntities.keys()).forEach(function (localId) {
            if (!incomingIds.has(localId)) {
              const entity = drawingEntities.get(localId);
              if (entity) viewer.entities.remove(entity);
              drawingEntities.delete(localId);
            }
          });
        }
        drawingsArray.forEach(function (d) {
          if (!Array.isArray(d.coords) || d.coords.length < 2) return;
          var localId = 'draw_loaded_' + d.id_dibujo;
          if (drawingEntities.has(localId)) {
            viewer.entities.remove(drawingEntities.get(localId));
            drawingEntities.delete(localId);
          }

          var ent = viewer.entities.add({
            id: localId,
            polyline: {
              positions: d.coords.map(function (p) { return Cesium.Cartesian3.fromDegrees(p.lng, p.lat); }),
              width: d.grosor || 4,
              material: Cesium.Color.fromCssColorString(d.color || '#00ffa6'),
              clampToGround: true
            },
            properties: { tacticalType: 'freehand-drawing' }
          });
          drawingEntities.set(localId, ent);
        });
      } catch (e) {
        console.error('Error loadDrawings: ' + e.message);
      }
    };

    window.removeDrawingFromMap = function (idDibujo) {
      try {
        var localId = 'draw_loaded_' + idDibujo;
        var ent = drawingEntities.get(localId);
        if (ent) {
          viewer.entities.remove(ent);
          drawingEntities.delete(localId);
        }
      } catch (e) {
        console.error('Error removeDrawingFromMap: ' + e.message);
      }
    };

    function tacticalRouteCoordinates(geometry) {
      if (!geometry) return [];
      let geo = geometry;
      if (typeof geo === 'string') {
        try { geo = JSON.parse(geo); } catch (_) { return []; }
      }

      if (geo.type === 'LineString' && Array.isArray(geo.coordinates)) {
        return geo.coordinates;
      }

      if (geo.type === 'MultiLineString' && Array.isArray(geo.coordinates)) {
        var merged = [];
        geo.coordinates.forEach(function (line) {
          if (Array.isArray(line)) merged = merged.concat(line);
        });
        return merged;
      }

      return [];
    }

    window.drawTacticalRoute = function (rutaObj) {
      try {
        if (!viewer || !rutaObj) return;

        const id = Number(rutaObj.id_ruta || rutaObj.id_elemento);
        if (!Number.isFinite(id) || id <= 0) return;

        const coords = tacticalRouteCoordinates(rutaObj.geometria || rutaObj.geometry || rutaObj.geojson)
          .map(function (coord) {
            return Cesium.Cartesian3.fromDegrees(Number(coord[0]), Number(coord[1]));
          });
        if (coords.length < 2) return;

        if (tacticalRoutes.has(id)) {
          viewer.entities.remove(tacticalRoutes.get(id));
          tacticalRoutes.delete(id);
        }

        const color = (rutaObj.color && String(rutaObj.color).startsWith('#')) ? rutaObj.color : '#1E90FF';
        const entity = viewer.entities.add({
          id: 'ruta_operacion_' + id,
          name: rutaObj.nombre || 'Linea tactica',
          polyline: {
            positions: coords,
            width: Number(rutaObj.grosor || rutaObj.width || 4),
            material: Cesium.Color.fromCssColorString(color),
            clampToGround: true
          },
          properties: {
            tacticalType: 'tactical-route',
            id_ruta: id
          }
        });

        tacticalRoutes.set(id, entity);
      } catch (e) {
        console.error('Error drawTacticalRoute: ' + e.message);
      }
    };

    window.loadTacticalRoutes = function (routesArray, replace) {
      try {
        if (!Array.isArray(routesArray)) return;
        const incomingIds = new Set(
          routesArray
            .map(route => Number(route && (route.id_ruta || route.id_elemento)))
            .filter(id => Number.isFinite(id) && id > 0)
        );
        if (replace) {
          Array.from(tacticalRoutes.keys()).forEach(function (id) {
            if (!incomingIds.has(Number(id))) {
              removeTacticalRouteFromMap(id);
            }
          });
        }
        routesArray.forEach(function (route) {
          drawTacticalRoute(route);
        });
      } catch (e) {
        console.error('Error loadTacticalRoutes: ' + e.message);
      }
    };

    window.removeTacticalRouteFromMap = function (idRuta) {
      try {
        const id = Number(idRuta);
        const entity = tacticalRoutes.get(id);
        if (entity) {
          viewer.entities.remove(entity);
          tacticalRoutes.delete(id);
        }
      } catch (e) {
        console.error('Error removeTacticalRouteFromMap: ' + e.message);
      }
    };

    window.removeDrawingByLocalId = function (localId) {
      try {
        var ent = drawingEntities.get(localId);
        if (ent) {
          viewer.entities.remove(ent);
          drawingEntities.delete(localId);
        }
      } catch (e) {
        console.error('Error removeDrawingByLocalId: ' + e.message);
      }
    };
  </script>
</body>
