services:
  postgres:
    image: postgres:16-alpine
    container_name: ops_postgres
    environment:
      POSTGRES_USER: operaciones
      POSTGRES_PASSWORD: operaciones123
      POSTGRES_DB: operaciones_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operaciones -d operaciones_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./Operaciones/api
      dockerfile: Dockerfile
    container_name: ops_api
    env_file:
      - ./Operaciones/api/.env
    environment:
      PORT: 3000
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: operaciones
      PGPASSWORD: operaciones123
      PGDATABASE: operaciones_db
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  db_data: {}
