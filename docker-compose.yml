version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: tuapp_db
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: appdb
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: tuapp_api
    ports:
      - "3000:3000"
    env_file:
      - Operaciones/api/.env
    depends_on:
      db:
        condition: service_healthy

volumes:
  - pgdata:/var/lib/postgresql/data
  - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql