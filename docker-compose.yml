version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: tuapp_db
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: appdb
    ports:
      - "5434:5432"   # host:contenedor
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: tuapp_api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PGHOST: db
      PGPORT: 5432
      PGUSER: appuser
      PGPASSWORD: apppass
      PGDATABASE: appdb
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
