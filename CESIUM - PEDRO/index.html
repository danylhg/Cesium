<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LA PRUEBA DE CESIUM</title>

    <link rel="stylesheet" href="./node_modules/cesium/Build/Cesium/Widgets/widgets.css" />

    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      #cesiumContainer {
        position: absolute;
        inset: 0;
        z-index: 1;
      }

      #hud {
        position: absolute;
        inset: 0;
        z-index: 999999;
        pointer-events: none;
        display: block;
      }

      .cesium-widget-credits {
        bottom: 6px !important;
        left: 6px !important;
        right: auto !important;
        opacity: 0.5;
        font-size: 10px !important;
      }

      /* ===== MENU ABC ===== */
      #menu {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 1000001;
        background: rgba(0, 0, 0, 0.78);
        color: #fff;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        padding: 10px;
        width: 260px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 10px;
        pointer-events: auto;
        backdrop-filter: blur(6px);
      }

      #menu h3 {
        margin: 0 0 8px;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.3px;
      }

      #menu .row {
        display: flex;
        gap: 6px;
        margin-bottom: 6px;
      }

      #menu select,
      #menu input,
      #menu button {
        width: 100%;
        background: rgba(20, 20, 20, 0.9);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.25);
        padding: 8px;
        border-radius: 8px;
        outline: none;
        font-size: 12px;
      }

      #menu input::placeholder {
        color: rgba(255, 255, 255, 0.55);
      }

      #menu button {
        cursor: pointer;
        font-weight: 600;
      }

      #menu button:hover {
        border-color: rgba(255, 255, 255, 0.45);
      }

      #menu .hint {
        font-size: 11px;
        opacity: 0.75;
        margin-top: 4px;
        line-height: 1.25;
      }

      #menu .pill {
        display: inline-block;
        padding: 2px 8px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 999px;
        font-size: 11px;
        opacity: 0.9;
      }

      #menu .err {
        color: #ffb3b3;
        font-size: 11px;
        margin-top: 6px;
        line-height: 1.25;
        min-height: 14px;
      }
    </style>
  </head>

  <body>
    <div id="cesiumContainer"></div>
    <canvas id="hud"></canvas>

    <div id="menu">
      <h3>ABC de puntitos</h3>

      <div class="row">
        <select id="pointList" title="Lista de puntos"></select>
      </div>

      <div class="row">
        <input id="name" placeholder="Nombre (único)" />
      </div>

      <div class="row">
        <input id="lat" placeholder="Lat (auto al mover)" />
        <input id="lon" placeholder="Lon (auto al mover)" />
      </div>

      <div class="row">
        <button id="add">Añadir (centro)</button>
        <button id="update">Cambiar</button>
        <button id="remove">Quitar</button>
      </div>

      <div class="hint">
        Centro actual: <span class="pill" id="centerReadout">---</span>
      </div>
      <div class="err" id="msg"></div>
    </div>

    <script src="./node_modules/cesium/Build/Cesium/Cesium.js"></script>

    <script>
      const CONFIG = {
        mexicoRect: { west: -118.6, south: 14.0, east: -86.5, north: 33.5 },
        camera: {
          // ✅ sin límites de zoom; solo usamos altura inicial
          startHeight: 900000
        },
        radar: {
          radiusFactor: 0.48,
          rings: 8,
          spokes: 24,
          ticks: 240,
          showHourLabels: false
        },
        points: [
          { name: "Veracruz", lon: -96.1342, lat: 19.1738 },
          { name: "Aguascalientes", lon: -102.296, lat: 21.8853 },
          { name: "Chihuahua", lon: -106.0889, lat: 28.6353 }
        ],
        hover: { hitRadius: 12, dotRadius: 5 }
      };

      const clamp = (v, min, max) => Math.min(max, Math.max(min, v));

      function createViewer(containerId) {
        return new Cesium.Viewer(containerId, {
          timeline: false,
          animation: false
        });
      }

      // ❌ ya no ponemos límites de zoom
      function setZoomNoLimits(scene) {
        const ssc = scene.screenSpaceCameraController;
        ssc.minimumZoomDistance = undefined;
        ssc.maximumZoomDistance = undefined;
        ssc.enableCollisionDetection = true;
      }

      // 🔒 solo encerramos a México (lat/lon), SIN tocar altura
      function lockCameraToRectangle(camera, rect) {
        let correcting = false;

        const west = rect.west;
        const east = rect.east;
        const south = rect.south;
        const north = rect.north;

        camera.changed.addEventListener(() => {
          if (correcting) return;

          const carto = Cesium.Cartographic.fromCartesian(camera.positionWC);
          if (!carto) return;

          if (
            !Number.isFinite(carto.height) ||
            !Number.isFinite(carto.longitude) ||
            !Number.isFinite(carto.latitude)
          ) {
            return;
          }

          const lon = Cesium.Math.negativePiToPi(carto.longitude);
          const lat = carto.latitude;

          const clampedLon = clamp(lon, west, east);
          const clampedLat = clamp(lat, south, north);

          const moved = clampedLon !== lon || clampedLat !== lat;
          if (!moved) return;

          correcting = true;
          camera.setView({
            destination: Cesium.Cartesian3.fromRadians(clampedLon, clampedLat, carto.height)
          });
          correcting = false;
        });
      }

      function setCameraStart(camera, rect, height) {
        const center = Cesium.Rectangle.center(rect);
        camera.setView({
          destination: Cesium.Cartesian3.fromRadians(center.longitude, center.latitude, height)
        });
      }

      function setupHud(canvas) {
        const ctx = canvas.getContext("2d");
        const state = { w: 0, h: 0 };

        function resize() {
          state.w = window.innerWidth;
          state.h = window.innerHeight;
          const dpr = window.devicePixelRatio || 1;

          canvas.width = Math.floor(state.w * dpr);
          canvas.height = Math.floor(state.h * dpr);
          canvas.style.width = `${state.w}px`;
          canvas.style.height = `${state.h}px`;

          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        window.addEventListener("resize", resize);
        resize();

        return { ctx, state };
      }

      function setupPointer(hudCanvas, hudState) {
        const pointer = { x: hudState.w / 2, y: hudState.h / 2, active: false };

        window.addEventListener("pointermove", (e) => {
          const rect = hudCanvas.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;

          pointer.x = x;
          pointer.y = y;
          pointer.active = x >= 0 && y >= 0 && x <= rect.width && y <= rect.height;
        });

        return pointer;
      }

      function drawRadarGrid(ctx, cfg, w, h, pointer) {
        const cx = w / 2;
        const cy = h / 2;
        const R = Math.min(w, h) * cfg.radiusFactor;

        const px = pointer?.x ?? cx;
        const py = pointer?.y ?? cy;

        const dx = px - cx;
        const dy = py - cy;
        const dist = Math.hypot(dx, dy);
        const ang = Math.atan2(dy, dx);

        const ringStep = R / cfg.rings;
        const ringIndex = clamp(Math.floor(dist / ringStep), 0, cfg.rings - 1);

        const spokeIndexRaw = Math.round(((ang + Math.PI) / (Math.PI * 2)) * cfg.spokes);
        const spokeIndex = ((spokeIndexRaw % cfg.spokes) + cfg.spokes) % cfg.spokes;
        const spokeAngle = (spokeIndex / cfg.spokes) * Math.PI * 2;

        ctx.save();
        ctx.strokeStyle = "white";
        ctx.fillStyle = "white";

        ctx.globalAlpha = 0.35;
        ctx.lineWidth = 1;
        for (let i = 1; i <= cfg.rings; i++) {
          const r = (R * i) / cfg.rings;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.globalAlpha = 0.3;
        for (let i = 0; i < cfg.spokes; i++) {
          const a = (i / cfg.spokes) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(cx + R * Math.cos(a), cy + R * Math.sin(a));
          ctx.stroke();
        }

        ctx.globalAlpha = 0.9;
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.arc(cx, cy, R, 0, Math.PI * 2);
        ctx.stroke();

        ctx.globalAlpha = 0.9;
        ctx.lineWidth = 1;
        for (let i = 0; i < cfg.ticks; i++) {
          const a = (i / cfg.ticks) * Math.PI * 2;
          const isMajor = i % 10 === 0;
          const len = isMajor ? 10 : 5;

          const x1 = cx + (R - len) * Math.cos(a);
          const y1 = cy + (R - len) * Math.sin(a);
          const x2 = cx + R * Math.cos(a);
          const y2 = cy + R * Math.sin(a);

          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
        }

        if (pointer?.active && dist <= R) {
          ctx.save();
          ctx.globalAlpha = 0.9;
          ctx.lineWidth = 2;
          const rr = (ringIndex + 1) * ringStep;
          ctx.beginPath();
          ctx.arc(cx, cy, rr, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();

          ctx.save();
          ctx.globalAlpha = 0.9;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(cx + R * Math.cos(spokeAngle), cy + R * Math.sin(spokeAngle));
          ctx.stroke();
          ctx.restore();

          ctx.save();
          ctx.globalAlpha = 0.9;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(cx, cy, dist, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(cx + R * Math.cos(ang), cy + R * Math.sin(ang));
          ctx.stroke();
          ctx.restore();
        }

        ctx.restore();
      }

      function drawStatePoints(ctx, scene, camera, points, w, h, pointer, hoverCfg) {
        const scratch2D = new Cesium.Cartesian2();
        const scratchDir = new Cesium.Cartesian3();
        const scratchNorm = new Cesium.Cartesian3();
        const scratchCamDir = new Cesium.Cartesian3();

        const HIT_RADIUS = hoverCfg.hitRadius;
        const DOT_RADIUS = hoverCfg.dotRadius;

        Cesium.Cartesian3.normalize(camera.directionWC, scratchCamDir);

        ctx.save();
        ctx.strokeStyle = "white";
        ctx.fillStyle = "white";

        for (const p of points) {
          if (!Number.isFinite(p.lat) || !Number.isFinite(p.lon)) continue;

          const world = Cesium.Cartesian3.fromDegrees(p.lon, p.lat, 0);
          const screen = scene.cartesianToCanvasCoordinates(world, scratch2D);
          if (!screen) continue;

          Cesium.Cartesian3.subtract(world, camera.positionWC, scratchDir);
          Cesium.Cartesian3.normalize(scratchDir, scratchNorm);

          if (Cesium.Cartesian3.dot(scratchNorm, scratchCamDir) <= 0) continue;
          if (screen.x < 0 || screen.x > w || screen.y < 0 || screen.y > h) continue;

          const hovered =
            pointer?.active &&
            Math.hypot(screen.x - pointer.x, screen.y - pointer.y) <= HIT_RADIUS;

          ctx.globalAlpha = hovered ? 1.0 : 0.65;
          ctx.lineWidth = hovered ? 2.2 : 1.2;

          ctx.beginPath();
          ctx.arc(screen.x, screen.y, DOT_RADIUS, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.restore();
      }

      function startLoop(ctx, hudState, scene, camera, pointer) {
        function frame() {
          const { w, h } = hudState;

          ctx.clearRect(0, 0, w, h);
          drawRadarGrid(ctx, CONFIG.radar, w, h, pointer);
          drawStatePoints(ctx, scene, camera, CONFIG.points, w, h, pointer, CONFIG.hover);

          requestAnimationFrame(frame);
        }

        requestAnimationFrame(frame);
      }

      // Centro del viewport (para lat/lon del centro)
      function getCenterLatLon(scene) {
        const canvas = scene.canvas;
        const center = new Cesium.Cartesian2(canvas.clientWidth / 2, canvas.clientHeight / 2);

        const ray = scene.camera.getPickRay(center);
        if (!ray) return null;

        const hit = scene.globe.pick(ray, scene);
        if (!hit) return null;

        const carto = Cesium.Cartographic.fromCartesian(hit);
        if (!carto) return null;

        return {
          lat: Cesium.Math.toDegrees(carto.latitude),
          lon: Cesium.Math.toDegrees(carto.longitude)
        };
      }

      function setupMenuABC(scene) {
        const list = document.getElementById("pointList");
        const nameInput = document.getElementById("name");
        const latInput = document.getElementById("lat");
        const lonInput = document.getElementById("lon");
        const centerReadout = document.getElementById("centerReadout");
        const msg = document.getElementById("msg");

        function setMsg(text = "") {
          msg.textContent = text;
        }

        function normName(s) {
          return String(s || "").trim().toLowerCase();
        }

        function nameExists(name, ignoreIndex = -1) {
          const n = normName(name);
          if (!n) return false;
          return CONFIG.points.some((p, i) => i !== ignoreIndex && normName(p.name) === n);
        }

        function startCenterTracking() {
          let last = "";

          function update() {
            const c = getCenterLatLon(scene);
            if (!c) {
              centerReadout.textContent = "---";
              return;
            }
            const lat = Math.round(c.lat * 1e5) / 1e5;
            const lon = Math.round(c.lon * 1e5) / 1e5;

            const s = `${lat}, ${lon}`;
            centerReadout.textContent = s;

            if (s !== last) {
              latInput.value = String(lat);
              lonInput.value = String(lon);
              last = s;
            }
          }

          scene.preRender.addEventListener(update);
          update();
        }

        function refreshList(keepIndex = true) {
          const prev = keepIndex ? Number(list.value) : 0;

          list.innerHTML = "";
          CONFIG.points.forEach((p, i) => {
            const opt = document.createElement("option");
            opt.value = String(i);
            opt.textContent = p.name ?? `Punto ${i + 1}`;
            list.appendChild(opt);
          });

          if (CONFIG.points.length === 0) {
            list.innerHTML = `<option value="-1">(sin puntos)</option>`;
            nameInput.value = "";
            setMsg("");
            return;
          }

          const next = clamp(prev, 0, CONFIG.points.length - 1);
          list.value = String(next);
          fillNameFromSelection();
        }

        function fillNameFromSelection() {
          const idx = Number(list.value);
          const p = CONFIG.points[idx];
          if (!p) return;
          nameInput.value = p.name ?? "";
          setMsg("");
        }

        function parseLatLonInputs() {
          const lat = parseFloat(String(latInput.value || "").trim());
          const lon = parseFloat(String(lonInput.value || "").trim());
          if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;
          if (lat < -90 || lat > 90) return null;
          if (lon < -180 || lon > 180) return null;
          return { lat, lon };
        }

        list.addEventListener("change", fillNameFromSelection);

        document.getElementById("add").onclick = () => {
          setMsg("");

          const name = String(nameInput.value || "").trim();
          if (!name) return setMsg("Pon un nombre para el punto.");
          if (nameExists(name)) return setMsg("Ese nombre ya existe. No se permiten repetidos.");

          const coords = parseLatLonInputs() || getCenterLatLon(scene);
          if (!coords) return setMsg("No pude obtener el centro (a veces pasa si estás muy lejos o el globo no está visible).");

          CONFIG.points.push({ name, lat: coords.lat, lon: coords.lon });
          refreshList(false);
          list.value = String(CONFIG.points.length - 1);
          fillNameFromSelection();
        };

        document.getElementById("update").onclick = () => {
          setMsg("");

          const idx = Number(list.value);
          const p = CONFIG.points[idx];
          if (!p) return;

          const name = String(nameInput.value || "").trim();
          if (!name) return setMsg("El nombre no puede estar vacío.");
          if (nameExists(name, idx)) return setMsg("Ese nombre ya existe en otro punto.");

          const coords = parseLatLonInputs() || getCenterLatLon(scene);
          if (!coords) return setMsg("No pude obtener el centro.");

          p.name = name;
          p.lat = coords.lat;
          p.lon = coords.lon;

          refreshList(true);
          list.value = String(idx);
          fillNameFromSelection();
        };

        document.getElementById("remove").onclick = () => {
          setMsg("");

          const idx = Number(list.value);
          if (!Number.isFinite(idx) || idx < 0 || idx >= CONFIG.points.length) return;

          CONFIG.points.splice(idx, 1);
          refreshList(false);
        };

        refreshList(false);
        startCenterTracking();
      }

      /* ===== INIT ===== */
      const viewer = createViewer("cesiumContainer");
      const { scene, camera } = viewer;

      const mexicoRect = Cesium.Rectangle.fromDegrees(
        CONFIG.mexicoRect.west,
        CONFIG.mexicoRect.south,
        CONFIG.mexicoRect.east,
        CONFIG.mexicoRect.north
      );

      // ✅ sin límites de zoom
      setZoomNoLimits(scene);

      // ✅ mantenemos encierro a México (lat/lon)
      lockCameraToRectangle(camera, mexicoRect);

      setCameraStart(camera, mexicoRect, CONFIG.camera.startHeight);

      const hudCanvas = document.getElementById("hud");
      const { ctx, state: hudState } = setupHud(hudCanvas);
      const pointer = setupPointer(hudCanvas, hudState);

      setupMenuABC(scene);
      startLoop(ctx, hudState, scene, camera, pointer);
    </script>
  </body>
</html>
